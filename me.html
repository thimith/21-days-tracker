<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="brand_assets/favicon.png">
  <link rel="apple-touch-icon" href="brand_assets/favicon.png">
  <title>My Account — 21-D Tracker</title>
  <link rel="stylesheet" href="me.css">
</head>
<body>

  <div class="header">
    <div class="header-logo"><img src="brand_assets/logo_eye.png" alt="">21-D Tracker</div>
  </div>

  <div class="page">
    <!-- Profile -->
    <div class="profile-card" id="profileCard"></div>

    <!-- Goals -->
    <div class="section-title">Goals</div>
    <div class="goals-card" id="goalsList"></div>

    <!-- Stakes -->
    <div class="section-title">Stakes</div>
    <div class="info-card" id="stakesList"></div>

    <!-- Cohort details -->
    <div class="section-title">Cohort</div>
    <div class="info-card" id="cohortInfo"></div>

    <!-- Account details -->
    <div class="section-title">Account</div>
    <div class="info-card" id="accountInfo"></div>

    <!-- Logout -->
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="app.html">
      
      <span class="nav-label">Today</span>
    </a>
    <a class="nav-item" href="cohort.html">
      
      <span class="nav-label">Cohort</span>
    </a>
    <a class="nav-item" id="adminNav" href="admin.html" style="display:none;">

      <span class="nav-label">Admin</span>
    </a>
    <a class="nav-item active" href="me.html">
      
      <span class="nav-label" id="userNavLabel">Me</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="me.js"></script>
</body>
</html>
