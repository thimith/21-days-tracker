<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="brand_assets/favicon.png">
  <link rel="apple-touch-icon" href="brand_assets/favicon.png">
  <title>Admin — 21-D Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 120%; }
    :root {
      --orange:    #FF5500;
      --orange-dk: #CC4400;
      --orange-lt: rgba(255,85,0,0.1);
      --green:     #34C759;
      --green-lt:  rgba(52,199,89,0.1);
      --red:       #FF3B30;
      --red-lt:    rgba(255,59,48,0.08);
      --yellow:    #FF9F0A;
      --blue:      #007AFF;
      --blue-lt:   rgba(0,122,255,0.1);
      --bg:        #F5F5F7;
      --card:      #FFFFFF;
      --text:      #1C1C1E;
      --muted:     #8E8E93;
      --border:    #E5E5EA;
      --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      padding-bottom: calc(94px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; font-size: 1.05rem; font-weight: 900; color: var(--text); letter-spacing: -0.02em; text-decoration: none; }
    .header-logo img { width: 28px; height: 28px; border-radius: 50%; }
    .admin-badge { font-size: 0.68rem; font-weight: 800; color: var(--orange); background: var(--orange-lt); padding: 3px 9px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.07em; }
    .tab-bar { background: var(--card); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; scrollbar-width: none; position: sticky; top: 56px; z-index: 99; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; padding: 12px 20px; font-family: inherit; font-size: 0.82rem; font-weight: 700; color: var(--muted); background: none; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
    .tab-btn.active-alert { color: var(--red); }
    .content { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--card); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); }
    .card-title { font-size: 0.85rem; font-weight: 800; color: var(--text); letter-spacing: -0.01em; margin-bottom: 14px; }
    .card-title small { font-size: 0.72rem; font-weight: 500; color: var(--muted); margin-left: 6px; letter-spacing: 0; }
    .form-field { margin-bottom: 12px; }
    .form-label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
    .form-input, .form-select { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.92rem; font-family: inherit; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .form-input:focus, .form-select:focus { border-color: var(--orange); }
    .form-input:disabled { opacity: 0.5; }
    .btn { padding: 11px 20px; font-family: inherit; font-size: 0.88rem; font-weight: 700; border-radius: 10px; cursor: pointer; border: none; transition: all 0.15s; }
    .btn.primary { background: var(--orange); color: #fff; }
    .btn.primary:hover  { background: var(--orange-dk); }
    .btn.primary:active { transform: scale(0.97); }
    .btn.secondary { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }
    .btn.danger  { background: var(--red-lt); color: var(--red); }
    .btn.full { width: 100%; }
    .btn-row { display: flex; gap: 8px; }
    .member-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .member-row:last-child { border-bottom: none; }
    .member-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: var(--orange-lt); color: var(--orange); font-size: 0.88rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .member-email { font-size: 0.74rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { width: 30px; height: 30px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .icon-btn.edit   { background: var(--blue-lt); color: var(--blue); }
    .icon-btn.add    { background: var(--green-lt); color: var(--green); }
    .icon-btn.remove { background: var(--red-lt);  color: var(--red); }
    .strikes-row { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
    .strike-pip { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .strike-pip.active { background: var(--red); }
    .redemption-status { font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
    .redemption-status.pending { background: var(--red-lt); color: var(--red); }
    .redemption-status.clear   { background: var(--green-lt); color: var(--green); }
    .override-goal-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .override-goal-row:last-child { border-bottom: none; }
    .override-goal-name { flex: 1; font-size: 0.88rem; color: var(--text); font-weight: 500; }
    .override-input { width: 70px; padding: 7px 8px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.88rem; font-family: inherit; color: var(--text); background: var(--bg); text-align: center; outline: none; transition: border-color 0.2s; }
    .override-input:focus { border-color: var(--orange); }
    .override-toggle { width: 44px; height: 26px; border-radius: 100px; border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .override-toggle.on  { background: var(--green); }
    .override-toggle.off { background: var(--border); }
    .toggle-knob { position: absolute; top: 3px; width: 20px; height: 20px; border-radius: 50%; background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: left 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .override-toggle.on  .toggle-knob { left: 21px; }
    .override-toggle.off .toggle-knob { left: 3px; }
    .goals-list { display: flex; flex-direction: column; gap: 8px; }
    .goal-edit-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg); border-radius: 10px; }
    .goal-edit-name { flex: 1; font-size: 0.88rem; color: var(--text); font-weight: 600; }
    .goal-edit-type { font-size: 0.72rem; color: var(--muted); }
    .cohort-card { background: var(--card); border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.1s; }
    .cohort-card:active { transform: scale(0.985); }
    .cohort-card.selected { border: 2px solid var(--orange); }
    .cohort-info { flex: 1; }
    .cohort-name  { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .cohort-meta  { font-size: 0.74rem; color: var(--muted); }
    .cohort-day-badge { font-size: 0.7rem; font-weight: 800; padding: 3px 9px; border-radius: 100px; background: var(--orange-lt); color: var(--orange); }
    .flash { padding: 10px 14px; border-radius: 10px; font-size: 0.82rem; font-weight: 600; display: none; }
    .flash.success { background: var(--green-lt); color: var(--green); display: block; }
    .flash.error   { background: var(--red-lt);   color: var(--red);   display: block; }
    .invite-link-box { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 0.78rem; color: var(--text); word-break: break-all; font-family: monospace; margin-bottom: 10px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; padding: 10px 0 max(10px, env(safe-area-inset-bottom)); z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 0; cursor: pointer; text-decoration: none; transition: opacity 0.15s; }
    .nav-icon  { display: none; }
    .nav-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .nav-item.active .nav-label { color: var(--orange); }
    .empty-state { text-align: center; padding: 32px 16px; font-size: 0.84rem; color: var(--muted); line-height: 1.6; }
    .divider { height: 1px; background: var(--border); margin: 2px 0; }
    .section-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .loading-state { text-align: center; padding: 32px; color: var(--muted); font-size: 0.84rem; }
    .pending-banner { background: var(--card); border-bottom: 2px solid var(--orange-lt); padding: 12px 16px; position: sticky; top: 96px; z-index: 98; }
    .pending-banner-title { font-size: 0.72rem; font-weight: 800; color: var(--orange); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .pending-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .pending-row:last-child { border-bottom: none; padding-bottom: 0; }
    .pending-name { flex: 1; font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .stakes-input { width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.86rem; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; resize: vertical; min-height: 60px; }
    .stakes-input:focus { border-color: var(--orange); }
    @media (min-width: 768px) {
      html { background: #DDDDE0; }
      body { max-width: min(62.5vw, 720px); margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.12); }
      .bottom-nav { left: 50%; right: auto; transform: translateX(-50%); width: min(62.5vw, 720px); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo"><img src="brand_assets/logo_eye.png" alt="">21-D Tracker</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="lastPushDate" style="font-size:0.48rem;color:var(--muted);"></span>
      <div class="admin-badge">Admin</div>
    </div>
  </div>

  <div id="pendingBanner" style="display:none;"></div>

  <div class="tab-bar">
    <button type="button" class="tab-btn active" onclick="switchTab('members')">Members</button>
    <button type="button" class="tab-btn"        onclick="switchTab('goals')">Goals</button>
    <button type="button" class="tab-btn"        onclick="switchTab('stakes')">Stakes</button>
    <button type="button" class="tab-btn"        onclick="switchTab('override')">Override</button>
    <button type="button" class="tab-btn"        onclick="switchTab('cohorts')">Cohorts</button>
    <button type="button" class="tab-btn"        onclick="switchTab('requests')" id="tabRequests">Requests</button>
  </div>

  <div class="content">
    <div class="tab-panel active" id="tab-members"><div class="loading-state">Loading…</div></div>
    <div class="tab-panel" id="tab-goals"></div>
    <div class="tab-panel" id="tab-stakes"></div>
    <div class="tab-panel" id="tab-override"></div>
    <div class="tab-panel" id="tab-cohorts"></div>
    <div class="tab-panel" id="tab-requests"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="app.html"><span class="nav-label">Today</span></a>
    <a class="nav-item" href="cohort.html"><span class="nav-label">Cohort</span></a>
    <a class="nav-item active" href="admin.html"><span class="nav-label">Admin</span></a>
    <a class="nav-item" href="me.html"><span class="nav-label">Me</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    fetch('https://api.github.com/repos/thimith/21-days-tracker/commits/main')
      .then(r => r.json())
      .then(d => {
        const date = new Date(d.commit.committer.date);
        const el = document.getElementById('lastPushDate');
        if (el) {
          const s = (Date.now() - date) / 1000;
          const rel = s < 60 ? `${Math.floor(s)}s` : s < 3600 ? `${Math.floor(s/60)}min` : s < 86400 ? `${Math.floor(s/3600)}h` : `${Math.floor(s/86400)}d`;
          el.textContent = rel;
        }
      }).catch(() => {});

    const SUPABASE_URL = 'https://lwlfrmdjgvybocnpchal.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3bGZybWRqZ3Z5Ym9jbnBjaGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NjE4MDYsImV4cCI6MjA4OTQzNzgwNn0.3kG4SxxXHSeu3J6_EmPPsO4Q40Yk0ZRabxlms0zS76U';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } });

    // ── Cache ─────────────────────────────────────────────────────────────
    const _ac = {
      userId: null, profile: null,
      cohorts: [],          // [{id, name, start_date, memberCount}]
      activeCohort: null,   // the admin's current active cohort
    };

    // ── Date helpers ──────────────────────────────────────────────────────
    function uid() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
    const parseLocalDate = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
    function getCohortDay(startDate, targetDate) {
      const s = parseLocalDate(startDate);
      const t = targetDate ? parseLocalDate(targetDate) : (() => { const n = new Date(); n.setHours(0,0,0,0); return n; })();
      return Math.floor((t-s)/86400000)+1;
    }

    // ── Tab state ─────────────────────────────────────────────────────────
    let activeTab        = 'members';
    let membersCohortId  = null;
    let overrideMemberId = null;
    const _lds = (d = new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    let overrideDate = _lds();
    let goalsMemberId    = null;
    let goalsMemberCohortId = null;
    let addGoalFormOpen  = false;
    let addGoalFrame     = 'daily';
    let addGoalMetric    = 'boolean';
    let addGoalTitle     = '';
    let addGoalTimeUnit  = 'min';
    let stakesMemberId   = null;
    let stakesCohortId   = null;

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach((b,i) => {
        b.classList.toggle('active', ['members','goals','stakes','override','cohorts','requests'][i] === tab);
      });
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      renderTab(tab);
    }

    async function renderTab(tab) {
      if (tab === 'members')  await renderMembers();
      if (tab === 'goals')    await renderGoals();
      if (tab === 'stakes')   await renderStakes();
      if (tab === 'override') await renderOverride();
      if (tab === 'cohorts')  await renderCohorts();
      if (tab === 'requests') await renderRequests();
    }

    // ════════════════════════════════════════════════════════════════════
    // TAB: MEMBERS
    // ════════════════════════════════════════════════════════════════════
    async function renderMembers() {
      const el = document.getElementById('tab-members');
      el.innerHTML = '<div class="loading-state">Loading…</div>';

      const { data: cohortsRaw } = await sb.from('cohorts').select('*').order('start_date', { ascending: false });
      const cohorts = cohortsRaw || [];

      if (!cohorts.length) { el.innerHTML = '<div class="empty-state">No cohorts yet. Create one in the Cohorts tab.</div>'; return; }
      if (!membersCohortId) membersCohortId = (_ac.activeCohort?.id || cohorts[0].id);

      const mc = cohorts.find(c => c.id === membersCohortId) || cohorts[0];
      membersCohortId = mc.id;

      // Load members of this cohort
      const { data: memberRows } = await sb.from('cohort_members')
        .select('user_id, profiles(id, first_name, role)')
        .eq('cohort_id', mc.id);
      const members = (memberRows || []).map(r => r.profiles).filter(Boolean);

      // Load redemptions for these members
      const memberIds = members.map(m => m.id);
      let redemptionsMap = {};
      if (memberIds.length) {
        const { data: rRaw } = await sb.from('redemptions')
          .select('*').eq('cohort_id', mc.id).in('user_id', memberIds);
        for (const r of (rRaw || [])) {
          if (!redemptionsMap[r.user_id]) redemptionsMap[r.user_id] = [];
          redemptionsMap[r.user_id].push(r);
        }
      }

      const cohortOptions = cohorts.map(c => `<option value="${c.id}"${c.id === mc.id ? ' selected' : ''}>${c.name}</option>`).join('');

      const rows = members.map(m => {
        const redemptions = redemptionsMap[m.id] || [];
        const pending     = redemptions.filter(r => r.status === 'pending');
        const pips        = [1,2,3].map(n => `<div class="strike-pip${n<=redemptions.length?' active':''}"></div>`).join('');
        const status      = pending.length
          ? `<span class="redemption-status pending">${pending.length} pending</span>`
          : `<span class="redemption-status clear">Clear</span>`;
        return `
          <div class="member-row">
            <div class="member-avatar">${(m.first_name||'?')[0].toUpperCase()}</div>
            <div class="member-info">
              <div class="member-name" id="mname-${m.id}">${m.first_name}</div>
              <div class="strikes-row">${pips} ${status}</div>
            </div>
            <div class="member-actions">
              <button type="button" class="icon-btn" onclick="removeRedemption('${m.id}')" title="Remove redemption">−</button>
              <button type="button" class="icon-btn add" onclick="addRedemption('${m.id}')" title="Add redemption">+</button>
              <button type="button" class="icon-btn edit" onclick="editMemberName('${m.id}')" title="Edit name">✎</button>
              <button type="button" class="icon-btn remove" onclick="removeMember('${m.id}')" title="Remove">✕</button>
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div class="card-title" style="margin-bottom:0;">Members</div>
            <select class="form-input" style="width:auto;font-size:0.8rem;padding:6px 10px;"
              onchange="membersCohortId=this.value;renderMembers()">
              ${cohortOptions}
            </select>
          </div>
          <div style="font-size:0.75rem;color:var(--muted);margin-bottom:12px;">${members.length} member${members.length!==1?'s':''} · starts ${mc.start_date}</div>
          <div>${rows || '<div class="empty-state">No members yet.</div>'}</div>
        </div>
        <div class="card">
          <div class="card-title">Generate Invite Link</div>
          <div class="form-field">
            <label class="form-label">Invite to</label>
            <select class="form-select" id="inviteType" onchange="onInviteTypeChange()">
              <option value="skool">Skool Community</option>
              <option value="exclusive">Exclusive Cohort</option>
            </select>
          </div>
          <div class="form-field" id="inviteCohortField" style="display:none;">
            <label class="form-label">Cohort</label>
            <select class="form-select" id="inviteCohortSelect">
              ${cohorts.map(c => `<option value="${c.id}">${c.name || c.start_date}</option>`).join('')}
            </select>
          </div>
          <div id="inviteLinkBox" style="display:none;" class="invite-link-box"></div>
          <div id="inviteFlash" class="flash"></div>
          <div class="btn-row" style="margin-top:4px;">
            <button type="button" class="btn primary full" onclick="inviteMember()">Generate Invite Link</button>
            <button type="button" class="btn secondary" id="copyInviteBtn" style="display:none;" onclick="copyInviteLink()">Copy</button>
          </div>
        </div>`;
    }

    let _pendingInviteLink = '';

    function onInviteTypeChange() {
      const type = document.getElementById('inviteType')?.value;
      document.getElementById('inviteCohortField').style.display = type === 'exclusive' ? '' : 'none';
    }

    async function inviteMember() {
      const flash   = document.getElementById('inviteFlash');
      const linkBox = document.getElementById('inviteLinkBox');
      flash.className = 'flash';
      linkBox.style.display = 'none';
      document.getElementById('copyInviteBtn').style.display = 'none';

      const type     = document.getElementById('inviteType')?.value;
      const cohortId = type === 'exclusive' ? document.getElementById('inviteCohortSelect')?.value : null;

      if (type === 'exclusive' && !cohortId) {
        flash.textContent = 'Select a cohort.'; flash.className = 'flash error'; return;
      }

      const { data: invite, error } = await sb.from('invites')
        .insert({ name: type, email: '', cohort_id: cohortId || null })
        .select().single();

      if (error || !invite) { flash.textContent = error?.message || 'Failed.'; flash.className = 'flash error'; return; }

      const base = window.location.origin + window.location.pathname.replace('admin.html', '');
      let url = `${base}index.html?invite=${invite.token}&path=${type}`;
      if (cohortId) url += `&cohort=${cohortId}`;
      _pendingInviteLink = url;

      linkBox.textContent = _pendingInviteLink;
      linkBox.style.display = 'block';

    async function editMemberName(userId) {
      const nameEl = document.getElementById(`mname-${userId}`);
      if (!nameEl) return;
      const current = nameEl.textContent;
      const input = document.createElement('input');
      input.style.cssText = 'font-size:0.88rem;font-weight:700;font-family:inherit;color:var(--text);background:transparent;border:none;border-bottom:2px solid var(--orange);outline:none;padding:0;width:140px;';
      input.value = current;
      nameEl.replaceWith(input);
      input.focus(); input.select();
      const commit = async () => {
        const newName = input.value.trim();
        if (newName && newName !== current) {
          const { error } = await sb.from('profiles').update({ first_name: newName }).eq('id', userId);
          if (error) { alert('Failed: ' + error.message); renderMembers(); return; }
        }
        renderMembers();
      };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', ev => { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } if (ev.key === 'Escape') renderMembers(); });
    }

    async function removeMember(userId) {
      if (!confirm('Remove this member from the cohort?')) return;
      await sb.from('cohort_members').delete().eq('cohort_id', membersCohortId).eq('user_id', userId);
      renderMembers();
    }

    async function addRedemption(userId) {
      const mc = (await sb.from('cohorts').select('start_date').eq('id', membersCohortId).single()).data;
      if (!mc) return;
      const dayNum = getCohortDay(mc.start_date);
      const wk = Math.ceil(dayNum / 7);
      const { data: existing } = await sb.from('redemptions').select('strike_number').eq('cohort_id', membersCohortId).eq('user_id', userId);
      const count = (existing?.length || 0) + 1;
      const id = `r_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
      await sb.from('redemptions').insert({ id, user_id: userId, cohort_id: membersCohortId, week_number: wk, strike_number: count, reason: 'Manual (admin)', status: 'pending' });
      renderMembers();
    }

    async function removeRedemption(userId) {
      const { data: existing } = await sb.from('redemptions').select('id, created_at').eq('cohort_id', membersCohortId).eq('user_id', userId).order('created_at', { ascending: false }).limit(1);
      if (!existing?.length) return;
      await sb.from('redemptions').delete().eq('id', existing[0].id);
      renderMembers();
    }

    async function renderGoals() {

      const { data: memberRows } = await sb.from('cohort_members')
        .select('user_id, profiles(id, first_name)').eq('cohort_id', mc.id);
      const members = (memberRows || []).map(r => r.profiles).filter(Boolean);

      const cohortOptions = cohorts.map(c => `<option value="${c.id}"${c.id === mc.id ? ' selected' : ''}>${c.name}</option>`).join('');

          </div>
          <div class="form-field">
            <select class="form-select" onchange="goalsMemberId=this.value;renderGoals()">
              <option value="">— choose member —</option>
              ${members.map(m => `<option value="${m.id}"${goalsMemberId===m.id?' selected':''}>${m.first_name}</option>`).join('')}
            </select>
          </div>
        </div>`;

      if (!goalsMemberId) { el.innerHTML = memberPicker; return; }

      // Load goals for this member
      const { data: goalsRaw } = await sb.from('goals')
        .select('*').eq('user_id', goalsMemberId).eq('cohort_id', mc.id).order('sort_order');
      const goals = (goalsRaw || []).map(g => ({
        id: g.id, userId: g.user_id, cohortId: g.cohort_id,
        type: g.type, title: g.title, config: g.config || {},
        locked: g.locked, order: g.sort_order
      }));

      const member = members.find(m => m.id === goalsMemberId);

      const typeLabel = { daily_boolean:'Daily ✓', daily_count:'Daily count', weekly_count:'Weekly count', daily_time:'Max time', daily_time_max:'Max time', daily_time_min:'Min time', milestone:'21-day goal', total_count:'21-day count', total_time_min:'21-day min time', total_time_max:'21-day max time' };
      const configLabel = g => {
        const c = g.config || {};
        if (g.type==='daily_count')   return `${c.dailyTarget}x/day`;
        if (g.type==='weekly_count')  return `${c.weeklyTarget}x/week`;
        if (g.type==='daily_time' || g.type==='daily_time_max') return `max ${((c.weeklyMaxMinutes||0)/60).toFixed(1)}h/week`;
        if (g.type==='daily_time_min') return `min ${((c.weeklyTargetMinutes||0)/60).toFixed(1)}h/week`;
        if (g.type==='total_count')    return `${c.totalTarget} total`;
        if (g.type==='total_time_min') return `≥${c.totalTargetMinutes}min total`;
        if (g.type==='total_time_max') return `≤${c.totalMaxMinutes}min total`;
        return '';
      };

      const goalRows = goals.map(g => `
        <div class="goal-edit-row">
          <div style="flex:1;min-width:0;">
            <div class="goal-edit-name">${g.title}</div>
            <div class="goal-edit-type">${typeLabel[g.type]||g.type}${configLabel(g) ? ' · '+configLabel(g) : ''}</div>
          </div>
          <button type="button" class="icon-btn remove" onclick="adminDeleteGoal('${g.id}')">✕</button>
        </div>`).join('');

      const pillStyle = sel => `style="padding:5px 11px;border-radius:100px;font-size:0.76rem;font-weight:600;cursor:pointer;border:1.5px solid;transition:all 0.15s;${sel?'background:var(--orange);color:#fff;border-color:var(--orange);':'background:var(--bg);color:var(--muted);border-color:var(--border);'}"`;

      const addForm = addGoalFormOpen ? `
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
          <div class="form-field">
            <label class="form-label">Goal name</label>
            <input class="form-input" id="agTitle" placeholder="e.g. Meditate" value="${addGoalTitle}" oninput="addGoalTitle=this.value" />
          </div>
          <div class="form-field">
            <label class="form-label">Time frame</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap;" id="agFramePills">
              <button type="button" ${pillStyle(addGoalFrame==='daily')}     onclick="setAdminFrame(this,'daily')">Daily</button>
              <button type="button" ${pillStyle(addGoalFrame==='weekly')}    onclick="setAdminFrame(this,'weekly')">Weekly</button>
              <button type="button" ${pillStyle(addGoalFrame==='milestone')} onclick="setAdminFrame(this,'milestone')">21 Days</button>
            </div>
          </div>
          <div class="form-field">
            <label class="form-label">Type</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap;" id="agMetricPills">
              ${addGoalFrame === 'weekly'
                ? `<button type="button" ${pillStyle(addGoalMetric==='days')}       onclick="setAdminMetric(this,'days')">Days/week</button>
                   <button type="button" ${pillStyle(addGoalMetric==='count')}      onclick="setAdminMetric(this,'count')">Count/Week</button>
                   <button type="button" ${pillStyle(addGoalMetric==='count_days')} onclick="setAdminMetric(this,'count_days')">Count/Day</button>
                   <button type="button" ${pillStyle(addGoalMetric==='min_time')}   onclick="setAdminMetric(this,'min_time')">Min time</button>
                   <button type="button" ${pillStyle(addGoalMetric==='max_time')}   onclick="setAdminMetric(this,'max_time')">Max time</button>`
                : `<button type="button" ${pillStyle(addGoalMetric==='boolean')}  onclick="setAdminMetric(this,'boolean')">Yes / No</button>
                   <button type="button" ${pillStyle(addGoalMetric==='count')}    onclick="setAdminMetric(this,'count')">Count</button>
                   <button type="button" ${pillStyle(addGoalMetric==='min_time')} onclick="setAdminMetric(this,'min_time')">Min time</button>
                   <button type="button" ${pillStyle(addGoalMetric==='max_time')} onclick="setAdminMetric(this,'max_time')">Max time</button>`
              }
            </div>
          </div>
          <div class="form-field" id="agCountField" style="${['count','count_days'].includes(addGoalMetric)?'':'display:none'}"><label class="form-label" id="agCountLabel">${addGoalFrame==='milestone'?'Total over 21 days':addGoalMetric==='count_days'?'Count per day':'Sessions per '+(addGoalFrame==='daily'?'day':'week')}</label><input class="form-input" id="agCount" type="number" min="1" max="999" placeholder="" /></div>
          <div class="form-field" id="agDaysField" style="${['days','count_days'].includes(addGoalMetric)?'':'display:none'}"><label class="form-label">Days per week (out of 7)</label><input class="form-input" id="agDays" type="number" min="1" max="7" placeholder="" /></div>
          <div class="form-field" id="agTimeField" style="${addGoalMetric==='min_time'||addGoalMetric==='max_time'?'':'display:none'}"><label class="form-label" id="agTimeLabel">${addGoalMetric==='min_time'?(addGoalFrame==='milestone'?'Total minimum over 21 days':addGoalFrame==='daily'?'Daily minimum':'Weekly minimum'):(addGoalFrame==='milestone'?'Total maximum over 21 days':addGoalFrame==='daily'?'Daily maximum':'Weekly maximum')}</label><div style="display:flex;gap:8px;align-items:center;"><input class="form-input" id="agTime" type="number" min="1" placeholder="" style="flex:1;" /><div style="display:flex;border:1.5px solid var(--border,#e2e2e2);border-radius:8px;overflow:hidden;flex-shrink:0;"><button type="button" onclick="addGoalTimeUnit='min';_syncAdminCfg()" style="padding:6px 10px;font-size:0.75rem;font-weight:600;border:none;cursor:pointer;background:${addGoalTimeUnit==='min'?'var(--orange,#FF6B35)':'#f5f5f5'};color:${addGoalTimeUnit==='min'?'#fff':'#999'};">min</button><button type="button" onclick="addGoalTimeUnit='hr';_syncAdminCfg()" style="padding:6px 10px;font-size:0.75rem;font-weight:600;border:none;cursor:pointer;background:${addGoalTimeUnit==='hr'?'var(--orange,#FF6B35)':'#f5f5f5'};color:${addGoalTimeUnit==='hr'?'#fff':'#999'};">hr</button></div></div></div>
          <div class="btn-row">
            <button type="button" class="btn secondary" onclick="addGoalFormOpen=false;addGoalTitle='';addGoalTimeUnit='min';renderGoals()">Cancel</button>
            <button type="button" class="btn primary" onclick="adminSaveGoal()">Add</button>
          </div>
        </div>` : `<button type="button" class="btn secondary full" style="margin-top:12px;" onclick="addGoalFormOpen=true;renderGoals()">+ Add Goal</button>`;

      el.innerHTML = `
        ${memberPicker}
        <div class="card">
          <div class="card-title">${member?.first_name}'s Goals <small>${goals.length}/10</small></div>
          <div class="goals-list">${goalRows || '<div class="empty-state" style="padding:16px 0;">No goals yet.</div>'}</div>
          ${addForm}
        </div>`;
    }


    function setAdminFrame(btn, frame) {
      addGoalFrame = frame;
      // Reset metric to a valid default for this frame
      if (frame === 'weekly' && !['days','count','count_days','min_time','max_time'].includes(addGoalMetric)) addGoalMetric = 'days';
      if (frame !== 'weekly' && !['boolean','count','min_time','max_time'].includes(addGoalMetric)) addGoalMetric = 'boolean';
      btn.closest("#agFramePills").querySelectorAll("button").forEach(b => { b.style.background=""; b.style.color=""; b.style.borderColor=""; });
      btn.style.background = "var(--orange)"; btn.style.color = "#fff"; btn.style.borderColor = "var(--orange)";
      _syncAdminCfg();
    }
    function setAdminMetric(btn, metric) {
      addGoalMetric = metric;
      btn.closest("#agMetricPills").querySelectorAll("button").forEach(b => { b.style.background=""; b.style.color=""; b.style.borderColor=""; });
      btn.style.background = "var(--orange)"; btn.style.color = "#fff"; btn.style.borderColor = "var(--orange)";
      _syncAdminCfg();
    }
    function _syncAdminCfg() {
      const cf  = document.getElementById("agCountField");
      const df  = document.getElementById("agDaysField");
      const tf  = document.getElementById("agTimeField");
      if (cf)  cf.style.display  = ["count","count_days"].includes(addGoalMetric) ? "" : "none";
      if (df)  df.style.display  = ["days","count_days"].includes(addGoalMetric) ? "" : "none";
      if (tf)  tf.style.display  = (addGoalMetric === "min_time" || addGoalMetric === "max_time") ? "" : "none";
      const cl = document.getElementById("agCountLabel");
      const tl = document.getElementById("agTimeLabel");
      if (cl) cl.textContent = addGoalFrame === "milestone" ? "Total over 21 days" : addGoalMetric === "count_days" ? "Count per day" : addGoalFrame === "daily" ? "Sessions per day" : "Sessions per week";
      if (tl) tl.textContent = addGoalMetric === "min_time"
        ? (addGoalFrame === "milestone" ? "Total minimum over 21 days (minutes)" : addGoalFrame === "daily" ? "Daily minimum (minutes)" : "Weekly minimum (minutes)")
        : (addGoalFrame === "milestone" ? "Total maximum over 21 days (minutes)" : addGoalFrame === "daily" ? "Daily maximum (minutes)" : "Weekly maximum (minutes)");
      // Rebuild metric pills in-place when frame changes (avoids full page re-render)
      const mp = document.getElementById("agMetricPills");
      if (mp) {
        if (addGoalFrame === 'weekly') {
          mp.innerHTML = `<button type="button" ${pillStyle(addGoalMetric==='days')}       onclick="setAdminMetric(this,'days')">Days/week</button>
                          <button type="button" ${pillStyle(addGoalMetric==='count')}      onclick="setAdminMetric(this,'count')">Count/Week</button>
                          <button type="button" ${pillStyle(addGoalMetric==='count_days')} onclick="setAdminMetric(this,'count_days')">Count/Day</button>
                          <button type="button" ${pillStyle(addGoalMetric==='min_time')}   onclick="setAdminMetric(this,'min_time')">Min time</button>
                          <button type="button" ${pillStyle(addGoalMetric==='max_time')}   onclick="setAdminMetric(this,'max_time')">Max time</button>`;
        } else {
          mp.innerHTML = `<button type="button" ${pillStyle(addGoalMetric==='boolean')}  onclick="setAdminMetric(this,'boolean')">Yes / No</button>
                          <button type="button" ${pillStyle(addGoalMetric==='count')}    onclick="setAdminMetric(this,'count')">Count</button>
                          <button type="button" ${pillStyle(addGoalMetric==='min_time')} onclick="setAdminMetric(this,'min_time')">Min time</button>
                          <button type="button" ${pillStyle(addGoalMetric==='max_time')} onclick="setAdminMetric(this,'max_time')">Max time</button>`;
        }
      }
    }
    async function adminDeleteGoal(goalId) {
      if (!confirm('Delete this goal?')) return;
      await sb.from('goals').delete().eq('id', goalId);
      renderGoals();
    }

    async function adminSaveGoal() {
      const title = addGoalTitle.trim();
      if (!title || !goalsMemberId) return;

      // Check goal count
      const { count } = await sb.from('goals').select('*', { count: 'exact', head: true })
        .eq('user_id', goalsMemberId).eq('cohort_id', goalsMemberCohortId);
      if (count >= 15) { alert('Max 15 goals.'); return; }

      const config = {};
      let type;
      const _tv = v => (parseInt(document.getElementById(v)?.value)||0) * (addGoalTimeUnit === 'hr' ? 60 : 1);
      if (addGoalFrame === 'milestone') {
        if (addGoalMetric === 'boolean')  { type = 'milestone'; }
        if (addGoalMetric === 'count')    { type = 'total_count';    config.totalTarget        = parseInt(document.getElementById('agCount')?.value)||10; }
        if (addGoalMetric === 'min_time') { type = 'total_time_min'; config.totalTargetMinutes = _tv('agTime')||120; }
        if (addGoalMetric === 'max_time') { type = 'total_time_max'; config.totalMaxMinutes    = _tv('agTime')||300; }
      } else if (addGoalFrame === 'weekly') {
        if (addGoalMetric === 'days')      { type = 'weekly_days';        config.daysTarget            = parseInt(document.getElementById('agDays')?.value)||5; }
        if (addGoalMetric === 'count')     { type = 'weekly_count';       config.weeklyTarget          = parseInt(document.getElementById('agCount')?.value)||3;
                                             config.multiPerDay = true; }
        if (addGoalMetric === 'count_days'){ type = 'daily_count_weekly'; config.dailyTarget           = parseInt(document.getElementById('agCount')?.value)||1;
                                                                           config.daysTarget            = parseInt(document.getElementById('agDays')?.value)||5; }
        if (addGoalMetric === 'min_time')  { type = 'weekly_time_min';    config.weeklyTargetMinutes   = _tv('agTime')||60; }
        if (addGoalMetric === 'max_time')  { type = 'weekly_time_max';    config.weeklyMaxMinutes      = _tv('agTime')||120; }
      } else {
        if (addGoalMetric === 'boolean')  { type = 'daily_boolean'; }
        if (addGoalMetric === 'count')    { type = 'daily_count';     config.dailyTarget           = parseInt(document.getElementById('agCount')?.value)||1; }
        if (addGoalMetric === 'min_time') { type = 'daily_time_min';  config.weeklyTargetMinutes   = _tv('agTime')||60; }
        if (addGoalMetric === 'max_time') { type = 'daily_time_max';  config.weeklyMaxMinutes      = _tv('agTime')||120; }
      }

      if (['min_time','max_time'].includes(addGoalMetric)) config.timeUnit = addGoalTimeUnit;
      await sb.from('goals').insert({
        id: `g_${uid()}`, type, title, config,
        user_id: goalsMemberId, cohort_id: goalsMemberCohortId,
        locked: false, sort_order: count || 0
      });

      addGoalFormOpen  = false;
      addGoalFrame     = 'daily';
      addGoalMetric    = 'boolean';
      addGoalTitle     = '';
      addGoalTimeUnit  = 'min';
      renderGoals();
    }

    async function saveStakes() {
      const complete = document.getElementById('stkComplete').value.trim();
      const r1       = document.getElementById('stkR1').value.trim();
      const r2       = document.getElementById('stkR2').value.trim();
      const fail     = document.getElementById('stkFail').value.trim();

      const { error } = await sb.from('stakes').upsert({
        user_id: stakesMemberId, cohort_id: stakesCohortId,
        complete, r1, r2, fail
      }, { onConflict: 'user_id,cohort_id' });

      const flash = document.getElementById('stakesFlash');
      if (error) { flash.textContent = error.message; flash.className = 'flash error'; }
      else { flash.textContent = 'Stakes saved.'; flash.className = 'flash success'; setTimeout(() => flash.className = 'flash', 2500); }
    }

      const memberPicker = `
        <div class="form-field">
          <label class="form-label">Member</label>
          <select class="form-select" onchange="overrideMemberId=this.value;renderOverride()">
            <option value="">— choose member —</option>
            ${members.map(m => `<option value="${m.id}"${overrideMemberId===m.id?' selected':''}>${m.first_name}</option>`).join('')}
          </select>
        </div>`;

      const datePicker = `
        <div class="form-field">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" value="${overrideDate}"
            onchange="overrideDate=this.value;renderOverride()" />
        </div>`;

      let goalRows = '';
      if (overrideMemberId) {
        const { data: goalsRaw } = await sb.from('goals')
          .select('*').eq('user_id', overrideMemberId).eq('cohort_id', activeCohort.id).order('sort_order');
        const goals = goalsRaw || [];

        // Load checkins for this date
        const goalIds = goals.map(g => g.id);
        const checkinMap = {};
        if (goalIds.length) {
          const { data: cRaw } = await sb.from('checkins')
            .select('goal_id,value').in('goal_id', goalIds).eq('date', overrideDate);
          for (const c of (cRaw || [])) checkinMap[c.goal_id] = c.value;
        }

        goalRows = goals.map(g => {
          const val = checkinMap[g.id] ?? null;
          if (g.type === 'daily_boolean' || g.type === 'milestone') {
            const on = !!(val);
            return `
              <div class="override-goal-row">
                <div class="override-goal-name">${g.title}</div>
                <button class="override-toggle${on?' on':' off'}" onclick="overrideToggle('${g.id}','${overrideDate}',${!on},'${overrideMemberId}')">
                  <div class="toggle-knob"></div>
                </button>
              </div>`;
          }
          const numVal = val !== null ? Number(val) : 0;
          const unit = g.type === 'weekly_count' || g.type === 'total_count' ? 'sessions' : 'min';
          return `
            <div class="override-goal-row">
              <div class="override-goal-name">${g.title}</div>
              <input class="override-input" type="number" min="0" value="${numVal}" placeholder="0"
                onchange="overrideValue('${g.id}','${overrideDate}',this.value,'${overrideMemberId}')" />
              <span style="font-size:0.72rem;color:var(--muted);white-space:nowrap;">${unit}</span>
            </div>`;
        }).join('');
      }

      el.innerHTML = `
        <div class="card">
          <div class="card-title">Override Check-in</div>
          ${memberPicker}
          ${datePicker}
          ${overrideMemberId && goalRows ? `
            <div style="margin-top:4px;">
              <div class="section-label">Goals on ${overrideDate}</div>
              ${goalRows}
            </div>
            <div id="overrideFlash" class="flash" style="margin-top:10px;"></div>` :
            overrideMemberId ? '<div class="empty-state" style="padding:16px 0;">No goals for this member.</div>' : ''}
        </div>`;
    }

    async function overrideToggle(goalId, date, newVal, userId) {
      const v = newVal ? 1 : 0;
      await sb.from('checkins').upsert({ goal_id: goalId, date, value: v, user_id: userId }, { onConflict: 'goal_id,date' });
      flashEl('overrideFlash', 'Saved.', 'success');
      renderOverride();
    }

    async function overrideValue(goalId, date, val, userId) {
      const v = parseInt(val) || 0;
      await sb.from('checkins').upsert({ goal_id: goalId, date, value: v, user_id: userId }, { onConflict: 'goal_id,date' });
      flashEl('overrideFlash', 'Saved.', 'success');
    }

    // ════════════════════════════════════════════════════════════════════
    // TAB: COHORTS
    // ════════════════════════════════════════════════════════════════════
    async function renderCohorts() {
      const el = document.getElementById('tab-cohorts');
      el.innerHTML = '<div class="loading-state">Loading…</div>';

      const { data: cohortsRaw } = await sb.from('cohorts').select('*').order('start_date', { ascending: false });
      const cohorts = cohortsRaw || [];

      // Get member counts
      const countMap = {};
      for (const c of cohorts) {
        const { count } = await sb.from('cohort_members').select('*', { count: 'exact', head: true }).eq('cohort_id', c.id);
        countMap[c.id] = count || 0;
      }

      const cohortCards = cohorts.map(c => {
        const day     = getCohortDay(c.start_date);
        const dayText = day < 1 ? 'Upcoming' : day > 21 ? 'Complete' : `Day ${day}`;
        const members = countMap[c.id] || 0;
        const isActive = _ac.activeCohort?.id === c.id;
        return `
          <div class="cohort-card${isActive?' selected':''}">
            <div class="cohort-info">
              <div class="cohort-name">${c.name}</div>
              <div class="cohort-meta">Starts ${c.start_date} · ${members} member${members!==1?'s':''}</div>
            </div>
            <div class="cohort-day-badge">${dayText}</div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <div class="card">
          <div class="card-title">All Cohorts</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${cohortCards || '<div class="empty-state" style="padding:16px 0;">No cohorts yet.</div>'}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Create New Cohort</div>
          <div class="form-field">
            <label class="form-label">Cohort name</label>
            <input class="form-input" id="newCohortName" placeholder="e.g. June 2 Cohort" />
          </div>
          <div class="form-field">
            <label class="form-label">Start date</label>
            <input class="form-input" id="newCohortDate" type="date" value="${new Date().toISOString().split('T')[0]}" />
          </div>
          <div id="newCohortFlash" class="flash"></div>
          <button type="button" class="btn primary full" style="margin-top:4px;" onclick="createCohort()">Create Cohort</button>
        </div>`;
    }

    async function createCohort() {
      const name      = document.getElementById('newCohortName')?.value?.trim();
      const startDate = document.getElementById('newCohortDate')?.value;
      const flashEl2  = document.getElementById('newCohortFlash');
      flashEl2.className = 'flash';

      if (!name || !startDate) { flashEl2.textContent = 'Fill in all fields.'; flashEl2.className = 'flash error'; return; }

      const id = `c_${uid()}`;
      const { error } = await sb.from('cohorts').insert({ id, name, start_date: startDate });
      if (error) { flashEl2.textContent = error.message; flashEl2.className = 'flash error'; return; }

      // Add admin to new cohort
      await sb.from('cohort_members').insert({ cohort_id: id, user_id: _ac.userId });

      flashEl2.textContent = `${name} created.`;
      flashEl2.className = 'flash success';
      document.getElementById('newCohortName').value = '';
      setTimeout(() => renderCohorts(), 1000);
    }

    // ════════════════════════════════════════════════════════════════════
    // TAB: REQUESTS
    // ════════════════════════════════════════════════════════════════════
    async function renderRequests() {
      const el = document.getElementById('tab-requests');
      el.innerHTML = '<div class="loading-state">Loading…</div>';

      const { data: requests } = await sb
        .from('pending_requests')
        .select('*, profiles(first_name, id)')
        .order('created_at');

      const pending  = (requests || []).filter(r => r.status === 'pending');
      const resolved = (requests || []).filter(r => r.status !== 'pending');

      const pendingRows = pending.length ? pending.map(r => {
        const name = r.profiles?.first_name || 'Unknown';
        const typeLabel = r.type === 'skool' ? '🌀 Skool Community' : '⭐ Exclusive Cohort';
        return `
          <div class="member-row" id="req-row-${r.id}">
            <div class="member-avatar">${name[0].toUpperCase()}</div>
            <div class="member-info">
              <div class="member-name">${name}</div>
              <div class="member-email">${typeLabel} · starts ${r.requested_start_date}</div>
            </div>
            <div class="member-actions">
              <button type="button" class="btn secondary" style="font-size:0.78rem;padding:6px 12px;" onclick="rejectRequest('${r.id}','${r.profiles?.id}')">Reject</button>
              <button type="button" class="btn primary"    style="font-size:0.78rem;padding:6px 12px;" onclick="approveRequest('${r.id}','${r.type}','${r.profiles?.id}','${r.requested_start_date}','${r.cohort_id||''}')">Approve</button>
            </div>
          </div>`;
      }).join('') : '<div class="empty-state">No pending requests.</div>';

      const resolvedRows = resolved.length ? resolved.map(r => {
        const name = r.profiles?.first_name || 'Unknown';
        const typeLabel = r.type === 'skool' ? '🌀 Skool' : '⭐ Exclusive';
        const statusColor = r.status === 'approved' ? 'var(--green)' : 'var(--red)';
        return `
          <div class="member-row">
            <div class="member-avatar" style="opacity:0.5;">${name[0].toUpperCase()}</div>
            <div class="member-info">
              <div class="member-name" style="color:var(--muted);">${name}</div>
              <div class="member-email">${typeLabel} · ${r.requested_start_date}</div>
            </div>
            <span style="font-size:0.72rem;font-weight:700;color:${statusColor};text-transform:uppercase;">${r.status}</span>
          </div>`;
      }).join('') : '';

      el.innerHTML = `
        <div class="card">
          <div class="card-title">Pending Requests <small>${pending.length}</small></div>
          ${pendingRows}
        </div>
        ${resolvedRows ? `<div class="card"><div class="card-title">Resolved</div>${resolvedRows}</div>` : ''}`;
    }

    async function approveRequest(reqId, type, userId, startDate, cohortId) {
      const row = document.getElementById(`req-row-${reqId}`);
      if (row) row.style.opacity = '0.4';

      if (type === 'skool') {
        // Create skool_members + skool_cycles rows
        const memberId = Date.now().toString(36) + Math.random().toString(36).substr(2,5);
        const cycleId  = Date.now().toString(36) + Math.random().toString(36).substr(2,6);
        const [{ error: e1 }, { error: e2 }] = await Promise.all([
          sb.from('skool_members').insert({ id: memberId, user_id: userId }),
          sb.from('skool_cycles').insert({ id: cycleId, user_id: userId, start_date: startDate, cycle_number: 1 })
        ]);
        if (e1 || e2) { alert('Error: ' + (e1||e2).message); if (row) row.style.opacity = ''; return; }
      } else {
        // Create cohort_members row
        if (!cohortId) { alert('No cohort ID on this request.'); if (row) row.style.opacity = ''; return; }
        const { error } = await sb.from('cohort_members').insert({ user_id: userId, cohort_id: cohortId });
        if (error) { alert('Error: ' + error.message); if (row) row.style.opacity = ''; return; }
      }

      await sb.from('pending_requests').update({ status: 'approved' }).eq('id', reqId);
      renderRequests();
    }

    async function rejectRequest(reqId, userId) {
      if (!confirm('Reject this request?')) return;
      const { error } = await sb.from('pending_requests').update({ status: 'rejected' }).eq('id', reqId);
      if (error) { alert('Error rejecting: ' + error.message); return; }
      renderRequests();
    }

    // ── Helpers ──────────────────────────────────────────────────────────
    function flashEl(id, msg, type) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = `flash ${type}`;
      setTimeout(() => { el.className = 'flash'; }, 2500);
    }

    async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

    async function checkPendingRequests() {
      const { count } = await sb.from('pending_requests').select('id', { count: 'exact', head: true }).eq('status', 'pending');
      const btn = document.getElementById('tabRequests');
      if (btn) btn.textContent = count > 0 ? `Requests (${count})` : 'Requests';
      if (count > 0) btn?.classList.add('active-alert');
    }

    // ── Unassigned members banner ─────────────────────────────────────────
    async function checkUnassignedMembers() {
      const [{ data: allProfiles }, { data: assigned }, { data: cohortsRaw }] = await Promise.all([
        sb.from('profiles').select('id, first_name, email').eq('role', 'member'),
        sb.from('cohort_members').select('user_id'),
        sb.from('cohorts').select('*').order('start_date', { ascending: false })
      ]);

      const assignedIds = new Set((assigned || []).map(r => r.user_id));
      const unassigned = (allProfiles || []).filter(p => !assignedIds.has(p.id));
      const cohorts = cohortsRaw || [];
      const banner = document.getElementById('pendingBanner');

      if (!unassigned.length) { banner.style.display = 'none'; return; }

      const cohortOptions = cohorts.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      const rows = unassigned.map(p => `
        <div class="pending-row" id="pending-row-${p.id}">
          <div class="member-avatar">${(p.first_name||'?')[0].toUpperCase()}</div>
          <div class="pending-name">${p.first_name}<div style="font-size:0.72rem;color:var(--muted);font-weight:400;">${p.email||''}</div></div>
          <select class="form-input" id="pending-cohort-${p.id}" style="width:auto;font-size:0.8rem;padding:6px 10px;">${cohortOptions}</select>
          <button type="button" class="btn primary" style="padding:7px 14px;font-size:0.8rem;flex-shrink:0;" onclick="assignToCohort('${p.id}')">Add</button>
          <button type="button" class="btn" style="padding:7px 12px;font-size:0.8rem;flex-shrink:0;background:var(--red);color:#fff;" onclick="deleteProfile('${p.id}','${p.first_name}')">✕</button>
        </div>`).join('');

      banner.style.display = 'block';
      banner.innerHTML = `<div class="pending-banner">
        <div class="pending-banner-title">${unassigned.length} new member${unassigned.length !== 1 ? 's' : ''} — assign to cohort</div>
        ${rows}
      </div>`;
    }

    async function assignToCohort(userId) {
      const cohortId = document.getElementById(`pending-cohort-${userId}`)?.value;
      if (!cohortId) return;
      const row = document.getElementById(`pending-row-${userId}`);
      if (row) row.style.opacity = '0.4';
      await sb.from('cohort_members').insert({ cohort_id: cohortId, user_id: userId });
      await checkUnassignedMembers();
      if (document.getElementById('tab-members').classList.contains('active')) renderMembers();
    }

    async function deleteProfile(userId, name) {
      if (!confirm(`Remove ${name} from the app? This deletes their profile and cannot be undone.`)) return;
      const row = document.getElementById(`pending-row-${userId}`);
      if (row) row.style.opacity = '0.4';
      const { error } = await sb.from('profiles').delete().eq('id', userId);
      if (error) { console.error('Delete profile error:', JSON.stringify(error)); alert('Delete failed: ' + error.message); if (row) row.style.opacity = '1'; return; }
      await checkUnassignedMembers();
    }

    // ── Init ─────────────────────────────────────────────────────────────
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      const authUser = session?.user;
      if (!authUser) { window.location.href = 'index.html'; return; }
      _ac.userId = authUser.id;

      const { data: profile } = await sb.from('profiles').select('*').eq('id', authUser.id).single();
      if (!profile || profile.role !== 'admin') { window.location.href = 'app.html'; return; }
      _ac.profile = profile;

      // Find admin's active cohort
      const { data: memberships } = await sb.from('cohort_members')
        .select('cohort_id, cohorts(*)').eq('user_id', authUser.id);
      if (memberships?.length) {
        const cohorts = memberships.map(m => m.cohorts).filter(Boolean);
        const active = cohorts.find(c => { const d = getCohortDay(c.start_date); return d >= 1 && d <= 21; });
        _ac.activeCohort = active || cohorts.sort((a,b) => new Date(b.start_date) - new Date(a.start_date))[0];
        if (_ac.activeCohort) membersCohortId = _ac.activeCohort.id;
      }

      await Promise.all([renderMembers(), checkUnassignedMembers(), checkPendingRequests()]);

      // Live updates: banner appears instantly when someone signs up or requests
      sb.channel('new_member_watch')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'profiles' }, () => {
          checkUnassignedMembers();
        })
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pending_requests' }, () => {
          checkPendingRequests();
        })
        .subscribe();
    })();
  </script>
</body>
</html>
