<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="brand_assets/favicon.png">
  <link rel="apple-touch-icon" href="brand_assets/favicon.png">
  <title>Admin — 21-D Tracker</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="header">
    <div class="header-logo"><img src="brand_assets/logo_eye.png" alt="">21-D Tracker</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="lastPushDate" style="font-size:0.48rem;color:var(--muted);"></span>
      <div class="admin-badge">Admin</div>
    </div>
  </div>

  <div id="pendingBanner" style="display:none;"></div>

  <div class="tab-bar">
    <button type="button" class="tab-btn active" onclick="switchTab('members')">Members</button>
    <button type="button" class="tab-btn"        onclick="switchTab('invites')">Invites</button>
    <button type="button" class="tab-btn"        onclick="switchTab('override')">Override</button>
    <button type="button" class="tab-btn"        onclick="switchTab('cohorts')">Cohorts</button>
    <button type="button" class="tab-btn"        onclick="switchTab('requests')" id="tabRequests">Requests</button>
  </div>

  <div class="content">
    <div class="tab-panel active" id="tab-members"><div class="loading-state">Loading…</div></div>
    <div class="tab-panel" id="tab-invites"></div>
    <div class="tab-panel" id="tab-override"></div>
    <div class="tab-panel" id="tab-cohorts"></div>
    <div class="tab-panel" id="tab-requests"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="app.html"><span class="nav-label">Today</span></a>
    <a class="nav-item" href="cohort.html"><span class="nav-label">Cohort</span></a>
    <a class="nav-item active" href="admin.html"><span class="nav-label">Admin</span></a>
    <a class="nav-item" href="me.html"><span class="nav-label">Me</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
