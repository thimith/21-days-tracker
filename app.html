        c.getBoundingClientRect(); // force reflow
        c.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
        c.style.transform  = 'translateY(0)';
      });
    }

    function _nextGoalEl(el) {
      let s = el.nextElementSibling;
      while (s) { if (s.dataset?.goalId && s.style.display !== 'none') return s; s = s.nextElementSibling; }
      return null;
    }

    function _endDrag() {
      if (!_dnd) return;
      const { card, clone, placeholder, goalId } = _dnd;
      const insertBeforeEl = _nextGoalEl(placeholder);
      const insertBeforeId = insertBeforeEl?.dataset?.goalId || null;

      // Snap clone into placeholder position, then commit
      const phRect = placeholder.getBoundingClientRect();
      clone.style.transition = 'left 0.22s cubic-bezier(0.34,1.56,0.64,1), top 0.22s cubic-bezier(0.34,1.56,0.64,1), transform 0.22s, box-shadow 0.22s, opacity 0.15s';
      clone.style.left      = phRect.left + 'px';
      clone.style.top       = phRect.top  + 'px';
      clone.style.transform = 'scale(1) rotate(0deg)';
      clone.style.boxShadow = 'var(--shadow)';
      clone.style.opacity   = '0';

      setTimeout(() => {
        clone.remove();
        placeholder.remove();
        card.style.display = '';
        _dnd = null;
        db.reorderGoals(goalId, insertBeforeId);
        renderContent();
      }, 220);
    }

    function _cancelDrag() {
      if (!_dnd) return;
      const { card, clone, placeholder } = _dnd;
      clone.remove(); placeholder.remove(); card.style.display = '';
      _dnd = null;
      renderContent();
    }

    // ── Edit mode (overlay: rename + drag handle + color picker) ──────────
    const _GOAL_COLORS = [
      { hex: '',        label: 'None'   },
      { hex: '#FF3B30', label: 'Red'    },
      { hex: '#FF9500', label: 'Orange' },
      { hex: '#FFCC00', label: 'Yellow' },
      { hex: '#34C759', label: 'Green'  },
      { hex: '#007AFF', label: 'Blue'   },
      { hex: '#AF52DE', label: 'Purple' },
      { hex: '#FF2D55', label: 'Pink'   },
    ];

    function _enterEditMode(card) {
      if (_editCardId === card.dataset.goalId) return;
      _exitEditMode();
      const goalId = card.dataset.goalId;
      const goal   = _c.goals.find(g => g.id === goalId);
      const currentTitle = goal?.title || card.querySelector('.goal-title')?.textContent || '';
      let selectedColor  = goal?.config?.color || '';

      card.classList.add('editing');
      _editCardId = goalId;

      const overlay = document.createElement('div');
      overlay.className = 'goal-edit-overlay';

      // ── Row 1: drag handle + title input + save ──
      const row1 = document.createElement('div');
      row1.className = 'ov-row1';

      const handle = document.createElement('span');
      handle.className = 'ov-handle';
      handle.textContent = '⠿';
      handle.addEventListener('click', e => e.stopPropagation());
      handle.addEventListener('pointerdown', e => {
        e.stopPropagation();
        _lpReady = null;
        _startDragNow(card, e.pointerId, e.clientX, e.clientY);
      });

      const input = document.createElement('input');
      input.className = 'goal-edit-input';
      input.value = currentTitle;
      input.addEventListener('click',      e => e.stopPropagation());
      input.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commitSave(); }
        if (e.key === 'Escape') { _exitEditMode(); }
      });

      const saveBtn = document.createElement('button');
      saveBtn.className = 'goal-edit-save';
      saveBtn.textContent = 'Save';
      saveBtn.addEventListener('click', e => { e.stopPropagation(); commitSave(); });

      row1.append(handle, input, saveBtn);

      // ── Row 2: color swatches ──
      const row2 = document.createElement('div');
      row2.className = 'ov-color-row';

      function buildSwatches() {
        row2.innerHTML = '';
        _GOAL_COLORS.forEach(({ hex, label }) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.title = label;
          btn.className = 'ov-swatch' + (selectedColor === hex ? ' selected' : '');
          if (hex) {
            btn.style.background = hex;
            btn.style.borderColor = selectedColor === hex ? 'transparent' : 'transparent';
          } else {
            btn.style.background = '#fff';
            btn.style.border = selectedColor === hex ? '2px solid transparent' : '2px dashed #ccc';
            btn.textContent = '✕';
          }
          btn.addEventListener('click', e => { e.stopPropagation(); selectedColor = hex; buildSwatches(); });
          btn.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
          row2.appendChild(btn);
        });
      }
      buildSwatches();

      overlay.append(row1, row2);
      card.appendChild(overlay);
      setTimeout(() => { input.focus(); input.select(); }, 40);

      function commitSave() {
        const newTitle     = input.value.trim();
        const titleChanged = newTitle && newTitle !== currentTitle;
        const colorChanged = selectedColor !== (goal?.config?.color || '');
        if (goal) {
          if (titleChanged) goal.title = newTitle;
          if (colorChanged) { goal.config = goal.config || {}; goal.config.color = selectedColor; }
          if (titleChanged || colorChanged) {
            const upd = {};
            if (titleChanged) upd.title = newTitle;
            if (colorChanged) upd.config = goal.config;
            sb.from('goals').update(upd).eq('id', goalId).then(() => {});
          }
        }
        // Propagate accent immediately to all day pages in the pager
        if (colorChanged) {
          document.querySelectorAll(`[data-goal-id="${goalId}"]`).forEach(el => {
            el.style.borderLeft = selectedColor ? `4px solid ${selectedColor}` : '';
          });
        }
        renderContent();
      }
    }

    // ── Per-card long-press + ready-to-drag listeners ─────────────────────
    function initGoalDragDrop() {
      document.querySelectorAll('[data-goal-id]').forEach(card => {
        let _lpTimer = null, _lpStartX = 0, _lpStartY = 0, _lpPointerId = null;

        card.addEventListener('pointerdown', e => {
          if (e.target.closest('button,input,.ov-handle,.goal-edit-overlay')) return;
          _lpStartX = e.clientX; _lpStartY = e.clientY; _lpPointerId = e.pointerId;
          _lpTimer = setTimeout(() => {
            _lpTimer = null;
            _suppressTap = true;
            _enterEditMode(card);
            // Mark as ready — drag activates on first movement
            _lpReady = { card, pointerId: _lpPointerId, startX: _lpStartX, startY: _lpStartY };
            // Mobile: prevent browser scroll from hijacking the gesture
            const noScroll = te => te.preventDefault();
            const dropNoScroll = () => {
              document.removeEventListener('touchmove',   noScroll);
              document.removeEventListener('touchend',    dropNoScroll);
              document.removeEventListener('touchcancel', dropNoScroll);
            };
            document.addEventListener('touchmove',   noScroll,      { passive: false });
            document.addEventListener('touchend',    dropNoScroll,  { once: true });
            document.addEventListener('touchcancel', dropNoScroll,  { once: true });
          }, 480);
        });

        card.addEventListener('pointermove', e => {
          const dx = e.clientX - _lpStartX, dy = e.clientY - _lpStartY;
          // Cancel timer if scrolling
          if (_lpTimer && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
            clearTimeout(_lpTimer); _lpTimer = null; return;
          }
          // Activate drag on first movement after long-press
          if (_lpReady?.card === card && !_dnd && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
            const { pointerId, startX, startY } = _lpReady;
            _lpReady = null;
            _startDragNow(card, pointerId, startX, startY);
          }
        });

        card.addEventListener('pointerup', () => {
          if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
          if (_lpReady?.card === card) _lpReady = null; // lifted without dragging → keep edit mode
        });
        card.addEventListener('pointercancel', () => {
          if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
          _lpReady = null;
        });

        card.addEventListener('click', e => {
          if (_suppressTap) {
            _suppressTap = false;
            // Don't swallow taps on the edit overlay itself (e.g. color swatches)
            if (!e.target.closest('.goal-edit-overlay')) e.stopImmediatePropagation();
          }
        }, { capture: true });
      });
    }

    // ── Horizontal day pager ──────────────────────────────────────────────
    let _pageIdx    = 0;
    let _pgDates    = [];
    let _maxPageIdx = 0; // highest navigable index (today or last cohort day)

    function goToPage(idx, animated) {
      const track = document.getElementById('pagerTrack');
      const wrap  = document.getElementById('pagerWrap');
      if (!animated) track.classList.add('no-anim');
      track.style.transform = `translateX(${-idx * wrap.clientWidth}px)`;
      if (!animated) { void track.offsetWidth; track.classList.remove('no-anim'); }
      _pageIdx = idx;
    }

    function _onPageChanged(idx) {
      if (idx < 0 || idx >= _pgDates.length) return;
      _pageIdx    = idx;
      selectedDate = _pgDates[idx];
      renderContent(); // rebuild the now-visible page so weekly totals are always fresh
      renderDateTabs();
      renderDots();
      // Keep active tab scrolled into view
      const tabsEl = document.getElementById('dateTabs');
      const active = tabsEl.querySelector('.date-tab.active');
      if (active) tabsEl.scrollLeft = active.offsetLeft - tabsEl.clientWidth / 2 + active.clientWidth / 2;
    }

    function selectDate(date) {
      const idx = _pgDates.indexOf(date);
      if (idx < 0) return;
      selectedDate = date;
      goToPage(idx, true);
      renderContent();
      renderDateTabs();
      const tabsEl = document.getElementById('dateTabs');
      const active = tabsEl.querySelector('.date-tab.active');
      if (active) tabsEl.scrollLeft = active.offsetLeft - tabsEl.clientWidth / 2 + active.clientWidth / 2;
    }

    function renderPager() {
      _pgDates = db.getCohortDates(cohort.startDate);
      const todayIdx = _pgDates.indexOf(localDateStr());
      _maxPageIdx = todayIdx >= 0 ? todayIdx : _pgDates.length - 1;
      const track = document.getElementById('pagerTrack');

      // Build all 21 pages at once
      track.innerHTML = _pgDates.map(d =>
        `<div class="day-page" data-date="${d}">${_buildDayHTML(d)}</div>`
      ).join('');

      // Snap to current date (no animation)
      const idx = Math.max(0, _pgDates.indexOf(selectedDate));
      _pageIdx = idx;
      goToPage(idx, false);

      initGoalDragDrop();
      _initPagerTouch();
    }

    function _initPagerTouch() {
      const wrap  = document.getElementById('pagerWrap');
      const track = document.getElementById('pagerTrack');
      if (!wrap || !track) return;

      // Remove any previous listener by replacing element's handler via closure flag
      if (wrap._pagerTouchInited) return;
      wrap._pagerTouchInited = true;

      let _tsX = 0, _tsY = 0, _dir = null, _live = false;

      wrap.addEventListener('touchstart', e => {
        if (_dnd) return;
        const t = e.touches[0];
        _tsX  = t.clientX;
        _tsY  = t.clientY;
        _dir  = null;
        _live = false;
        // Disable smooth transition during live drag
        track.classList.add('no-anim');
      }, { passive: true });

      wrap.addEventListener('touchmove', e => {
        if (_dnd || _lpReady) return; // don't conflict with card drag
        const t  = e.touches[0];
        const dx = t.clientX - _tsX;
        const dy = t.clientY - _tsY;

        // Determine direction on first significant move
        if (!_dir && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
          _dir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
        }
        if (_dir !== 'h') return; // vertical scroll — don't interfere

        e.preventDefault(); // claim the gesture
        _live = true;

        const w    = wrap.clientWidth;
        const base = -_pageIdx * w;
        const atEdge = (_pageIdx === 0 && dx > 0) || (_pageIdx >= _maxPageIdx && dx < 0);
        const visualDx = atEdge ? dx * 0.28 : dx; // rubber-band resistance at edges

        track.style.transform = `translateX(${base + visualDx}px)`;
      }, { passive: false });

      wrap.addEventListener('touchend', e => {
        track.classList.remove('no-anim');
        if (!_live || _dir !== 'h') return;

        const dx = e.changedTouches[0].clientX - _tsX;
        const w  = wrap.clientWidth;
        let nextIdx = _pageIdx;

        if (dx < -w * 0.25 && _pageIdx < _maxPageIdx) nextIdx = _pageIdx + 1;
        else if (dx >  w * 0.25 && _pageIdx > 0)     nextIdx = _pageIdx - 1;

        goToPage(nextIdx, true);
        _onPageChanged(nextIdx);
        _live = false;
        _dir  = null;
      }, { passive: true });

      wrap.addEventListener('touchcancel', () => {
        track.classList.remove('no-anim');
        // Snap back to current page
        goToPage(_pageIdx, true);
        _live = false;
        _dir  = null;
      }, { passive: true });

      window.addEventListener('resize', () => goToPage(_pageIdx, false));
    }

    function checkFailed() {
      if (!cohort) return;
      const r = db.getRedemptionsForUser();
      if (r.length >= 3) {
        document.body.insertAdjacentHTML('beforeend',`
          <div class="failed-overlay">
            <div class="failed-card">
              <div class="failed-icon">🔒</div>
              <div class="failed-title">Challenge Over</div>
              <p class="failed-body">You've reached 3 strikes. The 21-Day Challenge is complete for this cohort.<br><br>Contact Thierry for next steps.</p>
            </div>
          </div>`);
      }
    }

    // ══════════════════════════════════════════════════════════════════════
    // INTERACTIONS
    // ══════════════════════════════════════════════════════════════════════

    function toggleBoolean(goalId, date) {
      const c = db.getCheckin(goalId, date);
      db.setCheckin(goalId, date, !(c?.value));
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent(); renderDots(); updateXPBadge();
    }

    function incrementDailyCount(goalId, date, target) {
      const c = db.getCheckin(goalId, date);
      const cur = c ? Number(c.value)||0 : 0;
      db.setCheckin(goalId, date, cur >= target ? 0 : cur + 1);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent(); updateXPBadge();
    }

    function resetDailyCount(goalId, date) {
      db.setCheckin(goalId, date, 0);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent(); updateXPBadge();
    }

    function toggleSession(goalId, date) {
      const c = db.getCheckin(goalId, date);
      const cur = c ? Number(c.value)||0 : 0;
      db.setCheckin(goalId, date, cur > 0 ? 0 : 1);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent(); updateXPBadge();
    }

    function updateTime(goalId, date, val) {
      db.setCheckin(goalId, date, parseInt(val)||0);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent(); updateXPBadge();
    }

    function toggleMilestone(goalId) {
      // Milestone is a one-off — store on cohort start date regardless of selected day
      const canonDate = cohort.startDate;
      const allDates  = db.getCohortDates(cohort.startDate);
      const done      = allDates.some(d => !!db.getCheckin(goalId, d)?.value);
      // Clear any existing checkins on other dates, then set on canonical date
      allDates.forEach(d => { if (db.getCheckin(goalId, d)?.value) db.setCheckin(goalId, d, false); });
      db.setCheckin(goalId, canonDate, !done);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent(); updateXPBadge();
    }

    function doneRedemption(id) { db.markRedemptionDone(id); renderContent(); }

    function deleteGoal(e, goalId) {
      e.stopPropagation();
      db.deleteGoal(goalId);
      renderContent();
    }


    function openAddForm() {
      addFormOpen = true;
      document.getElementById('addForm').classList.add('open');
      document.getElementById('addGoalBtn').style.display = 'none';
    }
    function closeAddForm() {
      addFormOpen = false; addGoalTitle = '';
      document.getElementById('addForm').classList.remove('open');
      document.getElementById('addGoalBtn').style.display = '';
      const t = document.getElementById('newTitle'); if (t) t.value = '';
    }

    function setAddFrame(btn, frame) {
      addGoalFrame = frame;
      btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p => p.classList.remove('sel'));
      btn.classList.add('sel');
      _syncCfgFields();
    }

    function setAddMetric(btn, metric) {
      addGoalMetric = metric;
      btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p => p.classList.remove('sel'));
      btn.classList.add('sel');
      _syncCfgFields();
    }

    function _syncCfgFields() {
      const cf = document.getElementById('cfgCountField');
      const tf = document.getElementById('cfgTimeField');
      if (!cf || !tf) return;
      cf.style.display = addGoalMetric === 'count' ? '' : 'none';
      tf.style.display = (addGoalMetric === 'min_time' || addGoalMetric === 'max_time') ? '' : 'none';
      const cl = document.getElementById('cfgCountLabel');
      const tl = document.getElementById('cfgTimeLabel');
      if (cl) cl.textContent = addGoalFrame === 'milestone' ? 'Total sessions over 21 days' : 'Sessions per week';
      if (tl) tl.textContent = addGoalMetric === 'min_time'
        ? (addGoalFrame === 'milestone' ? 'Total minimum over 21 days (minutes)' : 'Weekly minimum (minutes)')
        : (addGoalFrame === 'milestone' ? 'Total maximum over 21 days (minutes)' : 'Weekly maximum (minutes)');
    }

    function saveGoal() {
      const title = addGoalTitle.trim();
      if (!title) return;
      const goals = db.getGoalsForUser();
      if (goals.length >= 15) { alert('Max 15 goals per cohort.'); return; }
      const config = {};
      let type;
      if (addGoalFrame === 'milestone') {
        if (addGoalMetric === 'boolean')  { type = 'milestone'; }
        if (addGoalMetric === 'count')    { type = 'total_count';    config.totalTarget        = parseInt(document.getElementById('cfgCountVal')?.value)||10; }
        if (addGoalMetric === 'min_time') { type = 'total_time_min'; config.totalTargetMinutes = parseInt(document.getElementById('cfgTimeVal')?.value)||120; }
        if (addGoalMetric === 'max_time') { type = 'total_time_max'; config.totalMaxMinutes    = parseInt(document.getElementById('cfgTimeVal')?.value)||300; }
      } else if (addGoalFrame === 'weekly') {
        if (addGoalMetric === 'boolean')  { type = 'daily_boolean'; }
        if (addGoalMetric === 'count')    { type = 'weekly_count';    config.weeklyTarget          = parseInt(document.getElementById('cfgCountVal')?.value)||3; }
        if (addGoalMetric === 'min_time') { type = 'weekly_time_min'; config.weeklyTargetMinutes   = parseInt(document.getElementById('cfgTimeVal')?.value)||60; }
        if (addGoalMetric === 'max_time') { type = 'weekly_time_max'; config.weeklyMaxMinutes      = parseInt(document.getElementById('cfgTimeVal')?.value)||120; }
      } else {
        if (addGoalMetric === 'boolean')  { type = 'daily_boolean'; }
        if (addGoalMetric === 'count')    { type = 'daily_count';     config.dailyTarget           = parseInt(document.getElementById('cfgCountVal')?.value)||1; }
        if (addGoalMetric === 'min_time') { type = 'daily_time_min';  config.weeklyTargetMinutes   = parseInt(document.getElementById('cfgTimeVal')?.value)||60; }
        if (addGoalMetric === 'max_time') { type = 'daily_time_max';  config.weeklyMaxMinutes      = parseInt(document.getElementById('cfgTimeVal')?.value)||120; }
      }
      db.upsertGoal({
        id:`g_${db.uid()}`, type, title, config,
        userId:session.userId, cohortId:cohort.id,
        locked:false, createdAt:new Date().toISOString(), order:goals.length
      });
      addGoalFrame  = 'daily';
      addGoalMetric = 'boolean';
      addGoalTitle  = '';
      addFormOpen   = false;
      renderContent();
    }

    async function logout() { await sb.auth.signOut(); window.location.href='index.html'; }

    // ── XP + Levels ───────────────────────────────────────────────────────
    const XP_LEVELS = [
      { min:0,   label:'Beginner',    icon:'🌱' },
      { min:75,  label:'Focused',     icon:'⚡' },
      { min:200, label:'Consistent',  icon:'🔥' },
      { min:400, label:'Disciplined', icon:'💪' },
      { min:700, label:'Elite',       icon:'🏆' },
    ];
    function calcXP() {
      if (!cohort) return 0;
      const dates = db.getCohortDates(cohort.startDate);
      const today = localDateStr();
      let xp = 0;
      for (const g of _c.goals) {
        for (const d of dates) {
          if (d > today) continue;
          const val = Number(_c.checkins[`${g.id}_${d}`] || 0);
          if (!val) continue;
          if (g.type === 'daily_boolean') xp += 10;
          else if (g.type === 'daily_count') xp += val >= (g.config?.dailyTarget||1) ? 10 : 4 * val;
          else if (g.type === 'weekly_days') xp += 10;
          else if (g.type === 'daily_count_weekly') xp += val >= (g.config?.dailyTarget||1) ? 10 : 4 * val;
          else if (g.type === 'weekly_count') xp += 5;
          else if (['daily_time','daily_time_min','daily_time_max','weekly_time_min','weekly_time_max'].includes(g.type)) xp += 8;
          else if (['milestone','total_count','total_time_min','total_time_max'].includes(g.type)) xp += 50;
        }
      }
      return xp;
    }
    function getXPLevel(xp) {
      let lv = XP_LEVELS[0];
      for (const l of XP_LEVELS) { if (xp >= l.min) lv = l; }
      return lv;
    }
    function updateXPBadge() {
      if (!cohort) return;
      const xp   = calcXP();
      const lv   = getXPLevel(xp);
      const idx  = XP_LEVELS.indexOf(lv);
      const next = XP_LEVELS[idx + 1];
      const pct  = next ? Math.round(((xp - lv.min) / (next.min - lv.min)) * 100) : 100;
      document.getElementById('xpIcon').textContent    = lv.icon;
      document.getElementById('xpLabel').textContent   = `${xp} XP`;
      document.getElementById('xpBarFill').style.width = `${pct}%`;
      document.getElementById('xpBadge').style.display = '';
    }
  </script>
</body>
