<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="brand_assets/favicon.png">
  <link rel="apple-touch-icon" href="brand_assets/favicon.png">
  <title>21-D Tracker</title>
  <style>
    html { font-size: 120%; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --orange:    #FF5500;
      --orange-dk: #CC4400;
      --orange-lt: rgba(255,85,0,0.1);
      --green:     #34C759;
      --green-lt:  rgba(52,199,89,0.1);
      --red:       #FF3B30;
      --red-lt:    rgba(255,59,48,0.1);
      --yellow:    #FF9F0A;
      --blue:      #007AFF;
      --blue-lt:   rgba(0,122,255,0.1);
      --bg:        #F5F5F7;
      --card:      #FFFFFF;
      --text:      #1C1C1E;
      --muted:     #8E8E93;
      --border:    #E5E5EA;
      --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      padding-bottom: calc(94px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 1.05rem; font-weight: 900;
      color: var(--text); letter-spacing: -0.02em;
      text-decoration: none;
    }
    .header-logo img { width: 28px; height: 28px; border-radius: 50%; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .day-badge {
      background: var(--orange);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .day-badge.upcoming { background: var(--muted); }
    .day-badge.complete { background: var(--green); }
    .avatar {
      width: 30px; height: 30px;
      background: var(--orange-lt);
      color: var(--orange);
      font-size: 0.78rem; font-weight: 800;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Progress strip ──────────────────────────────────────────────────── */
    .progress-section {
      background: var(--card);
      padding: 14px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .progress-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .cohort-label {
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .progress-pct { font-size: 0.72rem; color: var(--muted); }
    .dots-strip { display: flex; gap: 3px; align-items: center; }
    .dot {
      flex: 1; height: 7px; border-radius: 4px;
      transition: background 0.3s;
    }
    .dot.done    { background: var(--green); }
    .dot.missed  { background: rgba(255,59,48,0.35); }
    .dot.partial { background: var(--yellow); }
    .dot.today   { background: var(--orange); animation: pulse-dot 2s ease-in-out infinite; }
    .dot.future  { background: var(--border); }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scaleY(1); }
      50%     { opacity:0.65; transform:scaleY(1.5); }
    }

    /* ── Date tabs ───────────────────────────────────────────────────────── */
    .date-tabs {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex; gap: 6px;
      overflow-x: auto; scrollbar-width: none;
    }
    .date-tabs::-webkit-scrollbar { display: none; }
    .date-tab {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 0.76rem; font-weight: 600;
      color: var(--muted);
      background: var(--bg);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .date-tab.active { background: var(--orange); color: #fff; border-color: var(--orange); }
    .date-tab:not(.active):hover { border-color: var(--orange); color: var(--orange); }

    /* ── Pager ───────────────────────────────────────────────────────────── */
    .pager-wrap { overflow: hidden; width: 100%; }
    .pager-track { display: flex; will-change: transform; transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94); }
    .pager-track.no-anim { transition: none !important; }
    .day-page { min-width: 100%; flex-shrink: 0; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Redemption card ─────────────────────────────────────────────────── */
    .redemption-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      border-left: 4px solid var(--red);
      box-shadow: var(--shadow);
    }
    .redemption-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .redemption-label {
      font-size: 0.7rem; font-weight: 800; color: var(--red);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .strikes { display: flex; gap: 4px; margin-left: auto; }
    .strike-pip {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
    }
    .strike-pip.active { background: var(--red); }
    .redemption-reason {
      font-size: 0.88rem; color: var(--text); line-height: 1.45; margin-bottom: 12px;
    }
    .btn-redemption-done {
      width: 100%; padding: 10px;
      background: var(--green); color: #fff;
      font-family: inherit; font-size: 0.88rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-redemption-done:active { transform: scale(0.98); opacity: 0.9; }

    /* ── Goal card ───────────────────────────────────────────────────────── */
    .goal-group-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--muted); padding: 4px 2px 6px; margin-top: 4px;
    }
    .goal-card {
      background: var(--card);
      border-radius: 14px;
      padding: 11px 14px 11px 32px;
      box-shadow: var(--shadow);
      transition: transform 0.12s, opacity 0.12s;
      position: relative;
      overflow: hidden;
    }
    .goal-card.is-done { background: var(--green-lt); }
    .dnd-handle {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      color: var(--border); font-size: 1.1rem; line-height: 1;
      cursor: grab; user-select: none; touch-action: none;
    }
    .dnd-handle:active { cursor: grabbing; color: var(--muted); }
    .goal-card.dnd-dragging { opacity: 0.35; }
    .goal-card.dnd-over { transform: translateY(-3px); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .goal-card.is-tappable { cursor: pointer; }
    .goal-card.is-tappable:active { transform: scale(0.985); }
    .goal-type-tag {
      font-size: 0.47rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 3px;
    }
    .goal-title {
      font-size: 0.71rem; font-weight: 700; color: var(--text);
      letter-spacing: -0.01em; flex: 1;
    }

    /* Daily boolean */
    .bool-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .check-circle {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .check-circle.checked { background: var(--green); border-color: var(--green); }
    .check-circle svg { opacity:0; transform:scale(0.4); transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    .check-circle.checked svg { opacity:1; transform:scale(1); }

    /* Weekly count */
    .session-inline { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .session-dots-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .session-pip {
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff;
      border: 1.5px solid var(--border);
      transition: all 0.2s;
    }
    .session-pip.done { background: var(--orange); border-color: var(--orange); }
    .session-count-label { font-size: 0.53rem; color: var(--muted); }
    .session-count-label strong { color: var(--text); }

    /* Daily time */
    /* Single-line time card */
    .time-inline-row { display: flex; align-items: center; gap: 8px; }
    .time-counter { font-size: 0.56rem; font-weight: 700; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .time-counter.over { color: var(--red); }
    .time-counter.met  { color: var(--green); }
    .time-input {
      width: 64px; padding: 7px 8px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.75rem; font-family: inherit; font-weight: 700;
      color: var(--text); background: var(--bg);
      text-align: center; outline: none; flex-shrink: 0;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .time-input::-webkit-outer-spin-button,
    .time-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .time-input:focus { border-color: var(--orange); }
    .time-input:disabled { opacity: 0.5; }
    .time-unit { font-size: 0.63rem; color: var(--muted); flex-shrink: 0; }
    .time-bar-wrap {}
    .time-bar-labels {
      display: flex; justify-content: space-between;
      font-size: 0.54rem; color: var(--muted); margin-bottom: 4px;
    }
    .time-bar-labels.over { color: var(--red); }
    .time-bar {
      height: 4px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .time-bar-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      transition: width 0.35s;
    }
    .time-bar-fill.over { background: var(--red); }

    /* Milestone */
    .milestone-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 2px;
    }
    .milestone-chip {
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 8px; border-radius: 6px;
      background: var(--blue-lt); color: var(--blue);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .milestone-chip.done { background: var(--green-lt); color: var(--green); }

    /* ── Goal setup (pre Day-2) ──────────────────────────────────────────── */
    .setup-banner {
      background: var(--card);
      border-radius: 16px; padding: 16px 18px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--orange);
    }
    .setup-banner-title {
      font-size: 0.72rem; font-weight: 800; color: var(--orange);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .setup-banner-sub {
      font-size: 0.82rem; color: var(--muted); line-height: 1.45; margin-bottom: 14px;
    }
    .btn-add-goal {
      width: 100%; padding: 12px;
      background: var(--bg); color: var(--orange);
      font-family: inherit; font-size: 0.88rem; font-weight: 700;
      border: 2px dashed rgba(255,85,0,0.3); border-radius: 12px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-add-goal:hover { border-color: var(--orange); background: var(--orange-lt); }
    /* Add goal form */
    .add-form { display: none; margin-top: 14px; }
    .add-form.open { display: block; }
    .form-field { margin-bottom: 12px; }
    .form-label {
      display: block; font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px;
    }
    .form-input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.92rem; font-family: inherit; color: var(--text);
      background: var(--bg); outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--orange); }
    .type-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .type-pill {
      padding: 5px 11px; border-radius: 100px;
      font-size: 0.76rem; font-weight: 600;
      color: var(--muted); background: var(--bg);
      border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s;
    }
    .type-pill.sel { background: var(--orange); color: #fff; border-color: var(--orange); }
    .config-field { display: none; }
    .config-field.show { display: block; margin-top: 10px; }
    .form-row { display: flex; gap: 8px; margin-top: 4px; }
    .btn-xs {
      flex: 1; padding: 10px; font-family: inherit;
      font-size: 0.84rem; font-weight: 700;
      border-radius: 10px; cursor: pointer; transition: all 0.15s; border: none;
    }
    .btn-xs.pri { background: var(--orange); color: #fff; }
    .btn-xs.sec { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }

    /* ── Goal delete button (setup mode) ─────────────────────────────────── */
    .goal-delete {
      position: absolute; top: 12px; right: 14px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--red-lt); color: var(--red);
      font-size: 0.8rem; font-weight: 700;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .goal-delete:hover { background: rgba(255,59,48,0.2); }
    .goal-rename-btn {
      flex-shrink: 0;
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--bg); color: var(--muted);
      font-size: 0.8rem;
      border: 1px solid var(--border); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .goal-rename-btn:hover { background: var(--border); }

    /* ── Bottom nav ──────────────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 0 max(10px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 2px; padding: 10px 0;
      cursor: pointer; text-decoration: none; transition: opacity 0.15s;
    }
    .nav-icon { display: none; }
    .nav-label {
      font-size: 0.7rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .nav-item.active .nav-label { color: var(--orange); }

    /* ── Failed overlay ──────────────────────────────────────────────────── */
    .failed-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 999;
    }
    .failed-card {
      background: var(--card); border-radius: 24px;
      padding: 36px 28px; text-align: center; max-width: 320px;
    }
    .failed-icon { font-size: 3rem; margin-bottom: 16px; }
    .failed-title {
      font-size: 1.25rem; font-weight: 800; color: var(--text);
      margin-bottom: 10px; letter-spacing: -0.02em;
    }
    .failed-body { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 48px 20px;
      font-size: 0.88rem; color: var(--muted); line-height: 1.6;
    }
    @media (min-width: 768px) {
      html { background: #DDDDE0; }
      body { max-width: 62.5vw; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.12); }
      .bottom-nav { left: 50%; right: auto; transform: translateX(-50%); width: 62.5vw; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo"><img src="brand_assets/logo_eye.png" alt="">21-D Tracker</div>
    <div class="header-right">
      <div class="day-badge" id="dayBadge">—</div>
      <div class="avatar" id="userAvatar">?</div>
    </div>
  </div>

  <!-- Progress strip -->
  <div class="progress-section">
    <div class="progress-meta">
      <div class="cohort-label" id="cohortLabel">—</div>
      <div class="progress-pct" id="progressPct">—</div>
    </div>
    <div class="dots-strip" id="dotsStrip"></div>
  </div>

  <!-- Date tabs -->
  <div class="date-tabs" id="dateTabs"></div>

  <!-- Main content -->
  <div class="pager-wrap" id="pagerWrap"><div class="pager-track" id="pagerTrack"></div></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="app.html">

      <span class="nav-label">Today</span>
    </a>
    <a class="nav-item" href="cohort.html">

      <span class="nav-label">Cohort</span>
    </a>
    <a class="nav-item" id="adminNav" href="admin.html">

      <span class="nav-label">Admin</span>
    </a>
    <a class="nav-item" href="me.html">

      <span class="nav-label" id="userNavLabel">Me</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://lwlfrmdjgvybocnpchal.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3bGZybWRqZ3Z5Ym9jbnBjaGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NjE4MDYsImV4cCI6MjA4OTQzNzgwNn0.3kG4SxxXHSeu3J6_EmPPsO4Q40Yk0ZRabxlms0zS76U';
    const ADMIN_EMAIL = 'thierry.muller@gmail.com';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } });

    // ══════════════════════════════════════════════════════════════════════
    // CACHE
    // ══════════════════════════════════════════════════════════════════════
    const _c = {
      userId: null, profile: null,
      cohort: null,
      goals: [],
      checkins: {},
      stakes: null, redemptions: []
    };

    // ══════════════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════════════
    let session, user, cohort;
    const localDateStr  = (d = new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const parseLocalDate = s => { const [y,m,dd] = s.split('-').map(Number); return new Date(y, m-1, dd); };
    let selectedDate = localDateStr();
    let addGoalFrame  = 'daily';
    let addGoalMetric = 'boolean';
    let addGoalTitle  = '';
    let addFormOpen   = false;

    // ══════════════════════════════════════════════════════════════════════
    // DATA LAYER
    // ══════════════════════════════════════════════════════════════════════
    const db = {
      uid() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); },

      // ── Pure date helpers (unchanged) ──
      getCohortDay(startDate, targetDate) {
        const s = parseLocalDate(startDate);
        const t = targetDate ? parseLocalDate(targetDate) : (() => { const n=new Date(); n.setHours(0,0,0,0); return n; })();
        return Math.floor((t-s)/86400000)+1;
      },
      getCohortWeekNum(startDate, date) {
        const day = this.getCohortDay(startDate, date);
        return Math.min(3, Math.max(1, Math.ceil(day/7)));
      },
      getWeekDates(startDate, weekNum) {
        const s = parseLocalDate(startDate);
        return Array.from({length:7}, (_,i) => {
          const d = new Date(s); d.setDate(d.getDate()+(weekNum-1)*7+i);
          return localDateStr(d);
        });
      },
      getCohortDates(startDate) {
        return Array.from({length:21}, (_,i) => {
          const d = parseLocalDate(startDate); d.setDate(d.getDate()+i);
          return localDateStr(d);
        });
      },

      // ── Cache reads ──
      getGoalsForUser() { return _c.goals; },
      getCheckin(goalId, date) {
        const v = _c.checkins[`${goalId}_${date}`];
        return v !== undefined ? { value: v } : null;
      },
      getWeeklyTotal(goalId, weekDates) {
        return weekDates.reduce((s,d) => {
          const v = _c.checkins[`${goalId}_${d}`];
          return s + (v !== undefined ? Number(v)||0 : 0);
        }, 0);
      },
      areGoalsLocked() {
        return _c.cohort ? this.getCohortDay(_c.cohort.startDate) >= 2 : false;
      },
      getPendingRedemptions() {
        return _c.redemptions.filter(r => r.status === 'pending');
      },
      getRedemptionsForUser() { return _c.redemptions; },
      getStakes() { return _c.stakes; },
      isDayDone(uid, cid, date) {
        const gs = _c.goals.filter(g => g.type === 'daily_boolean');
        if (!gs.length) return false;
        return gs.every(g => !!_c.checkins[`${g.id}_${date}`]);
      },
      isDayPartial(uid, cid, date) {
        const gs = _c.goals.filter(g => g.type === 'daily_boolean');
        return gs.some(g => !!_c.checkins[`${g.id}_${date}`]);
      },

      // ── Cache writes + async Supabase saves ──
      setCheckin(goalId, date, value) {
        const v = typeof value === 'boolean' ? (value ? 1 : 0) : (parseInt(value)||0);
        _c.checkins[`${goalId}_${date}`] = v;
        sb.from('checkins').upsert({
          goal_id: goalId, date, value: v, user_id: _c.userId
        }, { onConflict: 'goal_id,date' }).then(() => {});
      },
      upsertGoal(g) {
        const idx = _c.goals.findIndex(x => x.id === g.id);
        if (idx >= 0) _c.goals[idx] = g; else _c.goals.push(g);
        sb.from('goals').upsert({
          id: g.id, user_id: g.userId, cohort_id: g.cohortId,
          type: g.type, title: g.title, config: g.config,
          locked: g.locked, sort_order: g.order
        }).then(() => {});
      },
      reorderGoals(fromId, toId) {
        const fromIdx = _c.goals.findIndex(g => g.id === fromId);
        const toIdx   = _c.goals.findIndex(g => g.id === toId);
        if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
        const [moved] = _c.goals.splice(fromIdx, 1);
        _c.goals.splice(toIdx, 0, moved);
        _c.goals.forEach((g, i) => { g.order = i; });
        // Persist new order in bulk
        const rows = _c.goals.map(g => ({
          id: g.id, user_id: g.userId, cohort_id: g.cohortId,
          type: g.type, title: g.title, config: g.config,
          locked: g.locked, sort_order: g.order
        }));
        sb.from('goals').upsert(rows).then(() => {});
      },
      deleteGoal(id) {
        _c.goals = _c.goals.filter(g => g.id !== id);
        sb.from('goals').delete().eq('id', id).then(() => {});
      },
      markRedemptionDone(id) {
        const r = _c.redemptions.find(x => x.id === id);
        if (r) r.status = 'done';
        sb.from('redemptions').update({ status: 'done' }).eq('id', id).then(() => {});
      },

      evalRedemptions(userId, cohortId) {
        const cohortObj = _c.cohort;
        if (!cohortObj) return;
        const currentDay = this.getCohortDay(cohortObj.startDate);
        if (currentDay < 2) return;

        const today = new Date(); today.setHours(0,0,0,0);
        const todayStr = localDateStr(today);
        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
        const yesterdayStr = localDateStr(yesterday);

        const goals = _c.goals;
        const existing = _c.redemptions;
        if (existing.length >= 3) return;

        const failuresByWeek = {};
        const addF = (wk, msg) => { if (!failuresByWeek[wk]) failuresByWeek[wk]=[]; failuresByWeek[wk].push(msg); };

        for (const g of goals) {

          // ── Daily: evaluate at end of each day (check yesterday) ──────────
          if (g.type === 'daily_boolean') {
            const yDay = currentDay - 1;
            if (yDay >= 1 && yDay <= 21) {
              const v = _c.checkins[`${g.id}_${yesterdayStr}`];
              if (!v) addF(this.getCohortWeekNum(cohortObj.startDate, yesterdayStr), `Missed: ${g.title}`);
            }

          // ── Weekly: evaluate at end of each week (day 8, 15, 22) ─────────
          } else if (g.type === 'weekly_count') {
            if (currentDay === 8 || currentDay === 15 || currentDay === 22) {
              const prevWk = currentDay===8 ? 1 : currentDay===15 ? 2 : 3;
              const wkDates = this.getWeekDates(cohortObj.startDate, prevWk);
              const total = this.getWeeklyTotal(g.id, wkDates);
              if (total < (g.config.weeklyTarget||1))
                addF(prevWk, `${g.title}: ${total}/${g.config.weeklyTarget} sessions`);
            }
          } else if (g.type === 'weekly_time_min' || g.type === 'daily_time_min') {
            if (currentDay === 8 || currentDay === 15 || currentDay === 22) {
              const prevWk = currentDay===8 ? 1 : currentDay===15 ? 2 : 3;
              const wkDates = this.getWeekDates(cohortObj.startDate, prevWk);
              const total = this.getWeeklyTotal(g.id, wkDates);
              if (total < (g.config.weeklyTargetMinutes||60))
                addF(prevWk, `${g.title}: ${total}min/${g.config.weeklyTargetMinutes}min target`);
            }
          } else if (g.type === 'weekly_time_max' || g.type === 'daily_time_max' || g.type === 'daily_time') {
            if (currentDay === 8 || currentDay === 15 || currentDay === 22) {
              const prevWk = currentDay===8 ? 1 : currentDay===15 ? 2 : 3;
              const wkDates = this.getWeekDates(cohortObj.startDate, prevWk);
              const total = this.getWeeklyTotal(g.id, wkDates);
              if (total > (g.config.weeklyMaxMinutes||120))
                addF(prevWk, `${g.title}: over weekly limit`);
            }

          // ── 21-day: evaluate at end of challenge (day 22) ─────────────────
          } else if (g.type === 'milestone') {
            if (currentDay === 22) {
              const allDates = this.getCohortDates(cohortObj.startDate);
              const done = allDates.some(d => !!_c.checkins[`${g.id}_${d}`]);
              if (!done) addF(3, `${g.title}: 21-day goal not completed`);
            }
          } else if (g.type === 'total_count') {
            if (currentDay === 22) {
              const allDates = this.getCohortDates(cohortObj.startDate);
              const total = allDates.reduce((s,d) => s + (Number(_c.checkins[`${g.id}_${d}`])||0), 0);
              if (total < (g.config.totalTarget||10))
                addF(3, `${g.title}: ${total}/${g.config.totalTarget} sessions`);
            }
          } else if (g.type === 'total_time_min') {
            if (currentDay === 22) {
              const allDates = this.getCohortDates(cohortObj.startDate);
              const total = allDates.reduce((s,d) => s + (Number(_c.checkins[`${g.id}_${d}`])||0), 0);
              if (total < (g.config.totalTargetMinutes||120))
                addF(3, `${g.title}: ${total}min/${g.config.totalTargetMinutes}min target`);
            }
          } else if (g.type === 'total_time_max') {
            if (currentDay === 22) {
              const allDates = this.getCohortDates(cohortObj.startDate);
              const total = allDates.reduce((s,d) => s + (Number(_c.checkins[`${g.id}_${d}`])||0), 0);
              if (total > (g.config.totalMaxMinutes||300))
                addF(3, `${g.title}: over 21-day limit`);
            }
          }
        }

        const currentWk = this.getCohortWeekNum(cohortObj.startDate);
        const pendingCurrent = existing.find(r => r.status === 'pending' && r.weekNumber === currentWk);
        if (pendingCurrent) {
          if (!failuresByWeek[currentWk]) {
            _c.redemptions = _c.redemptions.filter(r => r.id !== pendingCurrent.id);
            sb.from('redemptions').delete().eq('id', pendingCurrent.id).then(() => {});
            return;
          } else {
            pendingCurrent.reason = [...new Set(failuresByWeek[currentWk])].join(' · ');
            sb.from('redemptions').update({ reason: pendingCurrent.reason }).eq('id', pendingCurrent.id).then(() => {});
            return;
          }
        }

        let count = existing.length;
        for (const [wkStr, reasons] of Object.entries(failuresByWeek)) {
          if (count >= 3) break;
          const wk = parseInt(wkStr);
          if (existing.some(r => r.weekNumber === wk)) continue;
          count++;
          const id = `r_${this.uid()}`;
          const rec = {
            id, userId, cohortId,
            triggeredDate: todayStr,
            reason: [...new Set(reasons)].join(' · '),
            strikeNumber: count,
            weekNumber: wk,
            status: 'pending'
          };
          _c.redemptions.push(rec);
          sb.from('redemptions').insert({
            id, user_id: userId, cohort_id: cohortId,
            week_number: wk, strike_number: count,
            reason: rec.reason, status: 'pending'
          }).then(() => {});
        }
      },
    };

    // ══════════════════════════════════════════════════════════════════════
    // LOAD DATA
    // ══════════════════════════════════════════════════════════════════════
    async function loadData() {
      // 1. Auth
      const { data: { session } } = await sb.auth.getSession();
      const authUser = session?.user;
      if (!authUser) { window.location.href = 'index.html'; return; }
      _c.userId = authUser.id;

      // 2. Profile
      const { data: profile } = await sb.from('profiles').select('*').eq('id', _c.userId).single();
      _c.profile = profile;

      // 3. Cohort
      const { data: memberships } = await sb.from('cohort_members')
        .select('cohort_id, cohorts(*)')
        .eq('user_id', _c.userId);

      if (memberships?.length) {
        const cohorts = memberships.map(m => m.cohorts).filter(Boolean);
        const actives = cohorts.filter(c => { const d = db.getCohortDay(c.start_date); return d >= 1 && d <= 21; });
        const active = actives.sort((a,b) => new Date(b.start_date) - new Date(a.start_date))[0];
        const picked = active || cohorts.sort((a,b) => new Date(b.start_date)-new Date(a.start_date))[0];
        if (picked) {
          _c.cohort = { ...picked, startDate: picked.start_date };
        }
      }

      if (!_c.cohort) return;

      // 4. Goals
      const { data: goalsRaw } = await sb.from('goals')
        .select('*')
        .eq('user_id', _c.userId)
        .eq('cohort_id', _c.cohort.id)
        .order('sort_order');

      _c.goals = (goalsRaw || []).map(g => ({
        id: g.id, userId: g.user_id, cohortId: g.cohort_id,
        type: g.type, title: g.title, config: g.config || {},
        locked: g.locked, order: g.sort_order
      }));

      // 5. Checkins
      if (_c.goals.length) {
        const goalIds = _c.goals.map(g => g.id);
        const { data: checkinsRaw } = await sb.from('checkins')
          .select('goal_id, date, value')
          .in('goal_id', goalIds);

        _c.checkins = {};
        for (const c of (checkinsRaw || [])) {
          _c.checkins[`${c.goal_id}_${c.date}`] = c.value;
        }
      }

      // 6. Stakes
      const { data: stakesRaw } = await sb.from('stakes')
        .select('*')
        .eq('user_id', _c.userId)
        .eq('cohort_id', _c.cohort.id)
        .single();
      _c.stakes = stakesRaw || null;

      // 7. Redemptions
      const { data: redemptionsRaw } = await sb.from('redemptions')
        .select('*')
        .eq('user_id', _c.userId)
        .eq('cohort_id', _c.cohort.id)
        .order('strike_number');

      _c.redemptions = (redemptionsRaw || []).map(r => ({
        id: r.id, userId: r.user_id, cohortId: r.cohort_id,
        weekNumber: r.week_number, strikeNumber: r.strike_number,
        reason: r.reason, status: r.status
      }));
    }

    // ══════════════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════════════
    (async () => {
      await loadData();

      session = { userId: _c.userId, role: _c.profile?.role };
      user    = _c.profile;
      cohort  = _c.cohort;

      if (cohort) db.evalRedemptions(session.userId, cohort.id);

      // Header setup
      const currentDay = cohort ? db.getCohortDay(cohort.startDate) : 0;
      const badge = document.getElementById('dayBadge');
      if (!cohort) {
        badge.textContent = 'No cohort';
      } else if (currentDay < 1) {
        badge.textContent = 'Upcoming'; badge.classList.add('upcoming');
      } else if (currentDay > 21) {
        badge.textContent = 'Complete'; badge.classList.add('complete');
      } else {
        badge.textContent = `Day ${currentDay}`;
      }
      document.getElementById('userAvatar').textContent = (user?.name||'?')[0].toUpperCase();
      // 'Me' label stays as "Me"


      if (!cohort) {
        document.getElementById('pagerTrack').innerHTML = '<div class="day-page"><div class="empty-state">You\'re not in any cohort yet.<br>Ask Thierry to add you.</div></div>';
      } else {
        render();
      }
    })();

    // RENDER
    // ══════════════════════════════════════════════════════════════════════
    function render() {
      renderDots();
      renderDateTabs();
      renderPager();
      checkFailed();
    }

    function renderDots() {
      const dates    = db.getCohortDates(cohort.startDate);
      const todayStr = localDateStr();
      const day      = db.getCohortDay(cohort.startDate);
      const pct      = Math.max(0, Math.min(100, Math.round(((Math.min(day,21)-1)/21)*100)));

      document.getElementById('cohortLabel').textContent = cohort.name;
      document.getElementById('progressPct').textContent = `${pct}% complete`;

      const redemptionWeeks = new Set(db.getRedemptionsForUser().map(r => r.weekNumber));
      document.getElementById('dotsStrip').innerHTML = dates.map((d,i) => {
        const dayNum = i + 1;
        let cls = 'dot';
        if (d === todayStr) {
          cls += db.isDayDone(session.userId,cohort.id,d) ? ' done' : ' today';
        } else if (d < todayStr) {
          // Last day of a week with a redemption → red slip dot
          const weekNum = Math.ceil(dayNum / 7);
          const isLastDayOfWeek = dayNum % 7 === 0;
          if (isLastDayOfWeek && redemptionWeeks.has(weekNum)) {
            cls += ' missed';
          } else {
            cls += ' done';
          }
        } else {
          cls += ' future';
        }
        return `<div class="${cls}" title="Day ${i+1}"></div>`;
      }).join('');
    }

    function renderDateTabs() {
      const today = new Date();
      const tabs  = [];
      for (let i=6; i>=0; i--) {
        const d  = new Date(today); d.setDate(d.getDate()-i);
        const ds = localDateStr(d);
        const cd = db.getCohortDay(cohort.startDate, ds);
        if (cd < 1 || cd > 21) continue;
        const label = i===0 ? 'Today' : d.toLocaleDateString('en',{weekday:'short'});
        tabs.push(`<button type="button" class="date-tab${ds===selectedDate?' active':''}" onclick="selectDate('${ds}')">${label}</button>`);
      }
      document.getElementById('dateTabs').innerHTML = tabs.join('');
    }

    // Builds the inner HTML for a single day page
    function _buildDayHTML(date) {
      const goals   = db.getGoalsForUser();
      const locked  = db.areGoalsLocked();
      const pending = db.getPendingRedemptions();
      const strikes = db.getRedemptionsForUser().length;
      const html    = [];

      // ── Redemption banner ──
      if (pending.length) {
        const r = pending[0];
        const pips = [1,2,3].map(n=>`<div class="strike-pip${n<=strikes?' active':''}"></div>`).join('');
        const stakes = db.getStakes();
        const taskKey = r.strikeNumber === 1 ? 'r1' : r.strikeNumber === 2 ? 'r2' : 'fail';
        const taskText = stakes?.[taskKey] || '';
        html.push(`
          <div class="redemption-card">
            <div class="redemption-header">
              <div class="redemption-label">⚠ Redemption ${r.strikeNumber}</div>
              <div class="strikes">${pips}</div>
            </div>
            <div class="redemption-reason">${r.reason}</div>
            ${taskText ? `<div style="margin-top:8px;padding:10px 12px;background:rgba(255,59,48,0.07);border-radius:10px;font-size:0.82rem;color:var(--text);line-height:1.5;"><strong style="color:var(--red);font-size:0.73rem;letter-spacing:0.04em;text-transform:uppercase;">Your task</strong><br>${taskText}</div>` : ''}
            <button type="button" class="btn-redemption-done" onclick="doneRedemption('${r.id}')">Mark Done ✓</button>
          </div>`);
      }

      // ── Goal cards (grouped) ──
      if (!goals.length) {
        html.push('<div class="empty-state">No goals yet.<br>Add your goals below before Day 2.</div>');
      }

      const daily     = goals.filter(g => ['daily_boolean','daily_time','daily_time_min','daily_time_max'].includes(g.type));
      const weekly    = goals.filter(g => ['weekly_count','weekly_time_min','weekly_time_max'].includes(g.type));
      const milestone = goals.filter(g => ['milestone','total_count','total_time_min','total_time_max'].includes(g.type));

      if (daily.length) {
        html.push('<div class="goal-group-label">Daily</div>');
        daily.forEach(g => html.push(renderGoalCard(g, date, locked)));
      }
      if (weekly.length) {
        html.push('<div class="goal-group-label">Weekly</div>');
        weekly.forEach(g => html.push(renderGoalCard(g, date, locked)));
      }
      if (milestone.length) {
        html.push('<div class="goal-group-label">21-Day</div>');
        milestone.forEach(g => html.push(renderGoalCard(g, date, locked)));
      }

      // ── Goal setup (pre Day-2) ──
      if (!locked) {
        html.push(`
          <div class="setup-banner">
            <div class="setup-banner-title">⚙ Goal Setup</div>
            <div class="setup-banner-sub">Add up to 15 goals. Locks at midnight tonight.</div>
            <div class="add-form${addFormOpen?' open':''}" id="addForm">
              <div class="form-field">
                <label class="form-label">Goal name</label>
                <input class="form-input" id="newTitle" placeholder="e.g. Meditate, Workout, No YouTube…" value="${addGoalTitle}" oninput="addGoalTitle=this.value" />
              </div>
              <div class="form-field">
                <label class="form-label">Time frame</label>
                <div class="type-pills">
                  <button type="button" class="type-pill${addGoalFrame==='daily'?' sel':''}" onclick="setAddFrame(this,'daily')">Daily</button>
                  <button type="button" class="type-pill${addGoalFrame==='weekly'?' sel':''}" onclick="setAddFrame(this,'weekly')">Weekly</button>
                  <button type="button" class="type-pill${addGoalFrame==='milestone'?' sel':''}" onclick="setAddFrame(this,'milestone')">21 Days</button>
                </div>
              </div>
              <div class="form-field">
                <label class="form-label">Type</label>
                <div class="type-pills">
                  <button type="button" class="type-pill${addGoalMetric==='boolean'?' sel':''}" onclick="setAddMetric(this,'boolean')">Yes / No</button>
                  <button type="button" class="type-pill${addGoalMetric==='count'?' sel':''}" onclick="setAddMetric(this,'count')">Count</button>
                  <button type="button" class="type-pill${addGoalMetric==='min_time'?' sel':''}" onclick="setAddMetric(this,'min_time')">Min time</button>
                  <button type="button" class="type-pill${addGoalMetric==='max_time'?' sel':''}" onclick="setAddMetric(this,'max_time')">Max time</button>
                </div>
              </div>
              <div class="form-field" id="cfgCountField" style="${addGoalMetric==='count'?'':'display:none'}">
                <label class="form-label" id="cfgCountLabel">${addGoalFrame==='milestone'?'Total sessions over 21 days':addGoalFrame==='daily'?'Sessions per day':'Sessions per week'}</label>
                <input class="form-input" id="cfgCountVal" type="number" inputmode="numeric" min="1" max="63" onwheel="this.blur()" />
              </div>
              <div class="form-field" id="cfgTimeField" style="${addGoalMetric==='min_time'||addGoalMetric==='max_time'?'':'display:none'}">
                <label class="form-label" id="cfgTimeLabel">${addGoalMetric==='min_time'?(addGoalFrame==='milestone'?'Total minimum over 21 days (minutes)':addGoalFrame==='daily'?'Daily minimum (minutes)':'Weekly minimum (minutes)'):(addGoalFrame==='milestone'?'Total maximum over 21 days (minutes)':addGoalFrame==='daily'?'Daily maximum (minutes)':'Weekly maximum (minutes)')}</label>
                <input class="form-input" id="cfgTimeVal" type="number" inputmode="numeric" min="1" onwheel="this.blur()" />
              </div>
              <div class="form-row">
                <button type="button" class="btn-xs sec" onclick="closeAddForm()">Cancel</button>
                <button type="button" class="btn-xs pri" onclick="saveGoal()">Add Goal</button>
              </div>
            </div>
            <button type="button" class="btn-add-goal" id="addGoalBtn" style="${addFormOpen?'display:none':''}" onclick="openAddForm()">+ Add a goal</button>
          </div>`);
      }

      return html.join('');
    }

    // Re-renders only the current selected day's page (called after interactions)
    function renderContent() {
      const pageEl = document.querySelector(`.day-page[data-date="${selectedDate}"]`);
      if (!pageEl) return;
      pageEl.innerHTML = _buildDayHTML(selectedDate);
      initGoalDragDrop();
    }

    function renderGoalCard(g, date, locked) {
      const html = _renderGoalCardInner(g, date, locked);
      return html.replace('<div class="goal-card', `<div data-goal-id="${g.id}" data-goal-type="${g.type}" class="goal-card`);
    }

    function _renderGoalCardInner(g, date, locked) {
      const isFuture = date > localDateStr();
      const c = db.getCheckin(g.id, date);
      const typeLabel = { daily_boolean:'Daily habit', weekly_count:'Weekly target', daily_time:'Time tracking', daily_time_min:'Daily — min time', daily_time_max:'Daily — max time', milestone:'21-day goal' }[g.type] || g.type;
      const deleteBtn = !locked ? `<button type="button" class="goal-delete" onclick="deleteGoal(event,'${g.id}')">✕</button>` : '';
      const renameBtn = locked  ? `<button type="button" class="goal-rename-btn" onclick="startRenameGoal(event,'${g.id}',this)" title="Rename">✎</button>` : '';

      if (g.type === 'daily_boolean') {
        const done = !!(c?.value);
        return `
          <div class="goal-card${done?' is-done':''} is-tappable" onclick="toggleBoolean('${g.id}','${date}')">
            ${deleteBtn}
            <div class="bool-row">
              ${renameBtn}<div class="goal-title">${g.title}</div>
              <div class="check-circle${done?' checked':''}">
                <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                  <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>`;
      }

      if (g.type === 'weekly_count') {
        const wk      = db.getCohortWeekNum(cohort.startDate, date);
        const wkDates = db.getWeekDates(cohort.startDate, wk);
        const wkTotal = db.getWeeklyTotal(g.id, wkDates);
        const target  = (g.config && g.config.weeklyTarget) || 1;
        const todayV  = c ? Number(c.value)||0 : 0;
        const checked = todayV > 0;
        const pips    = Array.from({length:target}, (_,i) =>
          `<div class="session-pip${i<wkTotal?' done':''}"></div>`).join('');
        return `
          <div class="goal-card${checked?' is-done':''} is-tappable" onclick="${!isFuture?`toggleSession('${g.id}','${date}')`:''}" style="${isFuture?'cursor:default':''}">
            ${deleteBtn}
            <div class="bool-row">
              ${renameBtn}<div class="goal-title">${g.title}</div>
              <div class="session-inline">
                <div class="session-dots-row">${pips}</div>
                <div class="session-count-label"><strong>${wkTotal}</strong>/${target} this week</div>
              </div>
              <div class="check-circle${checked?' checked':''}">
                <svg width="12" height="9" viewBox="0 0 13 10" fill="none">
                  <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>`;
      }

      if (g.type === 'daily_time') {
        const wk      = db.getCohortWeekNum(cohort.startDate, date);
        const wkDates = db.getWeekDates(cohort.startDate, wk);
        const wkTotal = db.getWeeklyTotal(g.id, wkDates);
        const maxMin  = g.config.weeklyMaxMinutes || 120;
        const over    = wkTotal > maxMin;
        const todayV  = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1440"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">min</span>
              <span class="time-counter${over?' over':''}">${wkTotal}/${maxMin}</span>
            </div>
          </div>`;
      }

      if (g.type === 'daily_time_min') {
        const wk      = db.getCohortWeekNum(cohort.startDate, date);
        const wkDates = db.getWeekDates(cohort.startDate, wk);
        const wkTotal = db.getWeeklyTotal(g.id, wkDates);
        const target  = g.config.weeklyTargetMinutes || 60;
        const met     = wkTotal >= target;
        const todayV  = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1440"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">min</span>
              <span class="time-counter${met?' met':''}">${met?'✓ ':''}${wkTotal}/${target}</span>
            </div>
          </div>`;
      }

      if (g.type === 'daily_time_max') {
        const wk      = db.getCohortWeekNum(cohort.startDate, date);
        const wkDates = db.getWeekDates(cohort.startDate, wk);
        const wkTotal = db.getWeeklyTotal(g.id, wkDates);
        const maxMin  = g.config.weeklyMaxMinutes || 120;
        const over    = wkTotal > maxMin;
        const todayV  = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1440"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">min</span>
              <span class="time-counter${over?' over':''}">${over?'⚠ ':''}${wkTotal}/${maxMin}</span>
            </div>
          </div>`;
      }

      if (g.type === 'weekly_time_max') {
        const wk      = db.getCohortWeekNum(cohort.startDate, date);
        const wkDates = db.getWeekDates(cohort.startDate, wk);
        const wkTotal = db.getWeeklyTotal(g.id, wkDates);
        const maxMin  = g.config.weeklyMaxMinutes || 120;
        const over    = wkTotal > maxMin;
        const todayV  = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1440"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">min</span>
              <span class="time-counter${over?' over':''}">${over?'⚠ ':''}${wkTotal}/${maxMin}</span>
            </div>
          </div>`;
      }

      if (g.type === 'weekly_time_min') {
        const wk      = db.getCohortWeekNum(cohort.startDate, date);
        const wkDates = db.getWeekDates(cohort.startDate, wk);
        const wkTotal = db.getWeeklyTotal(g.id, wkDates);
        const target  = g.config.weeklyTargetMinutes || 60;
        const elapsed = Math.min(7, db.getCohortDay(cohort.startDate, date) - (wk-1)*7);
        const met     = elapsed >= 7 ? wkTotal >= target : true;
        const todayV  = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1440"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">min</span>
              <span class="time-counter${met?'':' over'}">${met?'':'⚠ '}${wkTotal}/${target}</span>
            </div>
          </div>`;
      }

      if (g.type === 'milestone') {
        const allDates = cohort ? db.getCohortDates(cohort.startDate) : [];
        const done = allDates.some(d => !!db.getCheckin(g.id, d)?.value);
        return `
          <div class="goal-card${done?' is-done':''} is-tappable" onclick="toggleMilestone('${g.id}')">
            ${deleteBtn}
            <div class="milestone-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <div class="check-circle${done?' checked':''}">
                <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                  <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <div style="margin-top:10px;">
              <span class="milestone-chip${done?' done':''}">${done?'✓ Complete':'21-day commitment'}</span>
            </div>
          </div>`;
      }

      if (g.type === 'total_count') {
        const allDates = cohort ? db.getCohortDates(cohort.startDate) : [];
        const total    = allDates.reduce((s,d) => s + (db.getCheckin(g.id,d)?.value||0), 0);
        const target   = g.config.totalTarget || 10;
        const met      = total >= target;
        const todayV   = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">today</span>
              <span class="time-counter${met?' met':''}">${met?'✓ ':''}${total}/${target}</span>
            </div>
          </div>`;
      }

      if (g.type === 'total_time_min') {
        const allDates = cohort ? db.getCohortDates(cohort.startDate) : [];
        const total    = allDates.reduce((s,d) => s + (db.getCheckin(g.id,d)?.value||0), 0);
        const target   = g.config.totalTargetMinutes || 120;
        const met      = total >= target;
        const todayV   = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1440"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">min</span>
              <span class="time-counter${met?' met':''}">${met?'✓ ':''}${total}/${target}min</span>
            </div>
          </div>`;
      }

      if (g.type === 'total_time_max') {
        const allDates = cohort ? db.getCohortDates(cohort.startDate) : [];
        const total    = allDates.reduce((s,d) => s + (db.getCheckin(g.id,d)?.value||0), 0);
        const maxMin   = g.config.totalMaxMinutes || 300;
        const over     = total > maxMin;
        const todayV   = c ? Number(c.value)||'' : '';
        return `
          <div class="goal-card">
            ${deleteBtn}
            <div class="time-inline-row">${renameBtn}
              <div class="goal-title">${g.title}</div>
              <input class="time-input" type="number" inputmode="numeric" min="0" max="1440"
                value="${todayV}" placeholder=""
                oninput="updateTime('${g.id}','${date}',this.value)"
                onwheel="this.blur()"
                ${isFuture?'disabled':''} />
              <span class="time-unit">min</span>
              <span class="time-counter${over?' over':''}">${over?'⚠ ':''}${total}/${maxMin}min</span>
            </div>
          </div>`;
      }

      return '';
    }

    // ── Drag-and-drop goal reordering ────────────────────────────────────
    const _dndGroups = {
      daily:     ['daily_boolean','daily_time','daily_time_min','daily_time_max'],
      weekly:    ['weekly_count','weekly_time_min','weekly_time_max'],
      milestone: ['milestone','total_count','total_time_min','total_time_max'],
    };
    function _dndGroup(type) {
      for (const [g, types] of Object.entries(_dndGroups)) if (types.includes(type)) return g;
      return null;
    }

    let _dnd = null;

    function initGoalDragDrop() {
      document.querySelectorAll('[data-goal-id]').forEach(card => {
        // Add handle if not already present
        if (!card.querySelector('.dnd-handle')) {
          const h = document.createElement('span');
          h.className = 'dnd-handle';
          h.textContent = '⠿';
          h.addEventListener('click', e => e.stopPropagation());
          card.insertBefore(h, card.firstChild);
        }

        // Pointer-based drag (works on touch + mouse)
        const handle = card.querySelector('.dnd-handle');
        handle.addEventListener('pointerdown', e => {
          e.stopPropagation();
          _dnd = { goalId: card.dataset.goalId, type: card.dataset.goalType, card, clone: null };

          // Create visual clone
          const rect = card.getBoundingClientRect();
          const clone = card.cloneNode(true);
          clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;pointer-events:none;z-index:9999;margin:0;box-shadow:0 8px 32px rgba(0,0,0,0.18);transform:scale(1.02);`;
          document.body.appendChild(clone);
          _dnd.clone = clone;
          _dnd.offsetX = e.clientX - rect.left;
          _dnd.offsetY = e.clientY - rect.top;

          card.classList.add('dnd-dragging');
          handle.setPointerCapture(e.pointerId);
        });

        handle.addEventListener('pointermove', e => {
          if (!_dnd || !_dnd.clone) return;
          _dnd.clone.style.left = (e.clientX - _dnd.offsetX) + 'px';
          _dnd.clone.style.top  = (e.clientY - _dnd.offsetY) + 'px';

          // Highlight target
          _dnd.clone.style.pointerEvents = 'none';
          const el = document.elementFromPoint(e.clientX, e.clientY);
          _dnd.clone.style.pointerEvents = 'none';
          const target = el?.closest('[data-goal-id]');
          document.querySelectorAll('.dnd-over').forEach(c => c.classList.remove('dnd-over'));
          if (target && target !== _dnd.card && _dndGroup(target.dataset.goalType) === _dndGroup(_dnd.type)) {
            target.classList.add('dnd-over');
          }
        });

        handle.addEventListener('pointerup', e => {
          if (!_dnd) return;
          _dnd.clone?.remove();
          _dnd.card.classList.remove('dnd-dragging');
          document.querySelectorAll('.dnd-over').forEach(c => c.classList.remove('dnd-over'));

          const el = document.elementFromPoint(e.clientX, e.clientY);
          const target = el?.closest('[data-goal-id]');
          if (target && target !== _dnd.card && _dndGroup(target.dataset.goalType) === _dndGroup(_dnd.type)) {
            db.reorderGoals(_dnd.goalId, target.dataset.goalId);
            renderContent();
          }
          _dnd = null;
        });
      });
    }

    // ── Horizontal day pager ──────────────────────────────────────────────
    let _pageIdx   = 0;
    let _pgDates   = [];

    function goToPage(idx, animated) {
      const track = document.getElementById('pagerTrack');
      const wrap  = document.getElementById('pagerWrap');
      if (!animated) track.classList.add('no-anim');
      track.style.transform = `translateX(${-idx * wrap.clientWidth}px)`;
      if (!animated) { void track.offsetWidth; track.classList.remove('no-anim'); }
      _pageIdx = idx;
    }

    function _onPageChanged(idx) {
      if (idx < 0 || idx >= _pgDates.length) return;
      _pageIdx    = idx;
      selectedDate = _pgDates[idx];
      renderDateTabs();
      renderDots();
      // Keep active tab scrolled into view
      const tabsEl = document.getElementById('dateTabs');
      const active = tabsEl.querySelector('.date-tab.active');
      if (active) tabsEl.scrollLeft = active.offsetLeft - tabsEl.clientWidth / 2 + active.clientWidth / 2;
    }

    function selectDate(date) {
      const idx = _pgDates.indexOf(date);
      if (idx < 0) return;
      selectedDate = date;
      goToPage(idx, true);
      renderDateTabs();
      const tabsEl = document.getElementById('dateTabs');
      const active = tabsEl.querySelector('.date-tab.active');
      if (active) tabsEl.scrollLeft = active.offsetLeft - tabsEl.clientWidth / 2 + active.clientWidth / 2;
    }

    function renderPager() {
      _pgDates = db.getCohortDates(cohort.startDate);
      const track = document.getElementById('pagerTrack');

      // Build all 21 pages at once
      track.innerHTML = _pgDates.map(d =>
        `<div class="day-page" data-date="${d}">${_buildDayHTML(d)}</div>`
      ).join('');

      // Snap to current date (no animation)
      const idx = Math.max(0, _pgDates.indexOf(selectedDate));
      _pageIdx = idx;
      goToPage(idx, false);

      initGoalDragDrop();
    }

    function checkFailed() {
      if (!cohort) return;
      const r = db.getRedemptionsForUser();
      if (r.length >= 3) {
        document.body.insertAdjacentHTML('beforeend',`
          <div class="failed-overlay">
            <div class="failed-card">
              <div class="failed-icon">🔒</div>
              <div class="failed-title">Challenge Over</div>
              <p class="failed-body">You've reached 3 strikes. The 21-Day Challenge is complete for this cohort.<br><br>Contact Thierry for next steps.</p>
            </div>
          </div>`);
      }
    }

    // ══════════════════════════════════════════════════════════════════════
    // INTERACTIONS
    // ══════════════════════════════════════════════════════════════════════

    function toggleBoolean(goalId, date) {
      const c = db.getCheckin(goalId, date);
      db.setCheckin(goalId, date, !(c?.value));
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent(); renderDots();
    }

    function toggleSession(goalId, date) {
      const c = db.getCheckin(goalId, date);
      const cur = c ? Number(c.value)||0 : 0;
      db.setCheckin(goalId, date, cur > 0 ? 0 : 1);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent();
    }

    let _timeDebounce;
    function updateTime(goalId, date, val) {
      db.setCheckin(goalId, date, parseInt(val)||0);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      clearTimeout(_timeDebounce);
      _timeDebounce = setTimeout(()=>{ renderContent(); }, 450);
    }

    function toggleMilestone(goalId) {
      // Milestone is a one-off — store on cohort start date regardless of selected day
      const canonDate = cohort.startDate;
      const allDates  = db.getCohortDates(cohort.startDate);
      const done      = allDates.some(d => !!db.getCheckin(goalId, d)?.value);
      // Clear any existing checkins on other dates, then set on canonical date
      allDates.forEach(d => { if (db.getCheckin(goalId, d)?.value) db.setCheckin(goalId, d, false); });
      db.setCheckin(goalId, canonDate, !done);
      if (cohort) db.evalRedemptions(session.userId, cohort.id);
      renderContent();
    }

    function doneRedemption(id) { db.markRedemptionDone(id); renderContent(); }

    function deleteGoal(e, goalId) {
      e.stopPropagation();
      db.deleteGoal(goalId);
      renderContent();
    }

    function startRenameGoal(e, goalId, btn) {
      e.stopPropagation();
      const card = btn.closest('.goal-card');
      const savedOnclick = card.onclick;
      card.onclick = null;
      const titleEl = card.querySelector('.goal-title');
      const current = titleEl.textContent;
      const input = document.createElement('input');
      input.style.cssText = 'flex:1;min-width:0;font-size:inherit;font-weight:700;font-family:inherit;color:var(--text);background:transparent;border:none;border-bottom:2px solid var(--orange);outline:none;padding:0;';
      input.value = current;
      input.addEventListener('click', ev => ev.stopPropagation());
      input.addEventListener('touchstart', ev => ev.stopPropagation());
      titleEl.replaceWith(input);
      btn.style.display = 'none';
      input.focus(); input.select();
      const commit = async () => {
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== current) {
          const goal = _c.goals.find(g => g.id === goalId);
          if (goal) { goal.title = newTitle; sb.from('goals').update({ title: newTitle }).eq('id', goalId).then(() => {}); }
        }
        renderContent();
      };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', ev => { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } if (ev.key === 'Escape') renderContent(); });
    }

    function openAddForm() {
      addFormOpen = true;
      document.getElementById('addForm').classList.add('open');
      document.getElementById('addGoalBtn').style.display = 'none';
    }
    function closeAddForm() {
      addFormOpen = false; addGoalTitle = '';
      document.getElementById('addForm').classList.remove('open');
      document.getElementById('addGoalBtn').style.display = '';
      const t = document.getElementById('newTitle'); if (t) t.value = '';
    }

    function setAddFrame(btn, frame) {
      addGoalFrame = frame;
      btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p => p.classList.remove('sel'));
      btn.classList.add('sel');
      _syncCfgFields();
    }

    function setAddMetric(btn, metric) {
      addGoalMetric = metric;
      btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p => p.classList.remove('sel'));
      btn.classList.add('sel');
      _syncCfgFields();
    }

    function _syncCfgFields() {
      const cf = document.getElementById('cfgCountField');
      const tf = document.getElementById('cfgTimeField');
      if (!cf || !tf) return;
      cf.style.display = addGoalMetric === 'count' ? '' : 'none';
      tf.style.display = (addGoalMetric === 'min_time' || addGoalMetric === 'max_time') ? '' : 'none';
      const cl = document.getElementById('cfgCountLabel');
      const tl = document.getElementById('cfgTimeLabel');
      if (cl) cl.textContent = addGoalFrame === 'milestone' ? 'Total sessions over 21 days' : 'Sessions per week';
      if (tl) tl.textContent = addGoalMetric === 'min_time'
        ? (addGoalFrame === 'milestone' ? 'Total minimum over 21 days (minutes)' : 'Weekly minimum (minutes)')
        : (addGoalFrame === 'milestone' ? 'Total maximum over 21 days (minutes)' : 'Weekly maximum (minutes)');
    }

    function saveGoal() {
      const title = addGoalTitle.trim();
      if (!title) return;
      const goals = db.getGoalsForUser();
      if (goals.length >= 15) { alert('Max 15 goals per cohort.'); return; }
      const config = {};
      let type;
      if (addGoalFrame === 'milestone') {
        if (addGoalMetric === 'boolean')  { type = 'milestone'; }
        if (addGoalMetric === 'count')    { type = 'total_count';    config.totalTarget        = parseInt(document.getElementById('cfgCountVal')?.value)||10; }
        if (addGoalMetric === 'min_time') { type = 'total_time_min'; config.totalTargetMinutes = parseInt(document.getElementById('cfgTimeVal')?.value)||120; }
        if (addGoalMetric === 'max_time') { type = 'total_time_max'; config.totalMaxMinutes    = parseInt(document.getElementById('cfgTimeVal')?.value)||300; }
      } else if (addGoalFrame === 'weekly') {
        if (addGoalMetric === 'boolean')  { type = 'daily_boolean'; }
        if (addGoalMetric === 'count')    { type = 'weekly_count';    config.weeklyTarget          = parseInt(document.getElementById('cfgCountVal')?.value)||3; }
        if (addGoalMetric === 'min_time') { type = 'weekly_time_min'; config.weeklyTargetMinutes   = parseInt(document.getElementById('cfgTimeVal')?.value)||60; }
        if (addGoalMetric === 'max_time') { type = 'weekly_time_max'; config.weeklyMaxMinutes      = parseInt(document.getElementById('cfgTimeVal')?.value)||120; }
      } else {
        if (addGoalMetric === 'boolean')  { type = 'daily_boolean'; }
        if (addGoalMetric === 'count')    { type = 'weekly_count';    config.weeklyTarget          = parseInt(document.getElementById('cfgCountVal')?.value)||3; }
        if (addGoalMetric === 'min_time') { type = 'daily_time_min';  config.weeklyTargetMinutes   = parseInt(document.getElementById('cfgTimeVal')?.value)||60; }
        if (addGoalMetric === 'max_time') { type = 'daily_time_max';  config.weeklyMaxMinutes      = parseInt(document.getElementById('cfgTimeVal')?.value)||120; }
      }
      db.upsertGoal({
        id:`g_${db.uid()}`, type, title, config,
        userId:session.userId, cohortId:cohort.id,
        locked:false, createdAt:new Date().toISOString(), order:goals.length
      });
      addGoalFrame  = 'daily';
      addGoalMetric = 'boolean';
      addGoalTitle  = '';
      addFormOpen   = false;
      renderContent();
    }

    async function logout() { await sb.auth.signOut(); window.location.href='index.html'; }
  </script>
