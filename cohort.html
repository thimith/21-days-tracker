<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="brand_assets/favicon.png">
  <link rel="apple-touch-icon" href="brand_assets/favicon.png">
  <title>Cohort — 21-D Tracker</title>
  <link rel="stylesheet" href="cohort.css">
</head>
<body>
  <div class="header">
    <div class="header-logo"><img src="brand_assets/logo_eye.png" alt="">21-D Tracker</div>
  </div>

  <!-- Page title (shown when only one tab) -->
  <div id="pageTitle" style="display:none; padding:14px 20px 0; font-size:1rem; font-weight:800; color:var(--text); letter-spacing:-0.01em;"></div>

  <!-- Tabs (shown when admin sees both) -->
  <div class="tabs" id="tabBar" style="display:none;">
    <button class="tab-btn active" id="tabSkool" onclick="switchTab('skool')">Skool Community</button>
    <button class="tab-btn" id="tabExclusive" onclick="switchTab('exclusive')">Exclusive Cohort</button>
  </div>

  <div class="summary-bar" id="summaryBar" style="display:none;"></div>
  <div class="content" id="content"><div class="empty-state">Loading…</div></div>

  <nav class="bottom-nav">
    <a class="nav-item" href="app.html"><span class="nav-label">Today</span></a>
    <a class="nav-item active" href="cohort.html"><span class="nav-label">Cohort</span></a>
    <a class="nav-item" id="adminNav" href="admin.html"><span class="nav-label">Admin</span></a>
    <a class="nav-item" href="me.html"><span class="nav-label" id="userNavLabel">Me</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cohort.js"></script>
</body>
</html>
