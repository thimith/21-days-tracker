<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="brand_assets/favicon.png">
  <link rel="apple-touch-icon" href="brand_assets/favicon.png">
  <title>Cohort — 21-D Tracker</title>
  <style>
    html { font-size: 120%; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --orange:    #FF5500;
      --orange-dk: #CC4400;
      --orange-lt: rgba(255,85,0,0.1);
      --green:     #34C759;
      --green-lt:  rgba(52,199,89,0.1);
      --red:       #FF3B30;
      --red-lt:    rgba(255,59,48,0.08);
      --yellow:    #FF9F0A;
      --blue:      #007AFF;
      --bg:        #F5F5F7;
      --card:      #FFFFFF;
      --text:      #1C1C1E;
      --muted:     #8E8E93;
      --border:    #E5E5EA;
      --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      padding-bottom: calc(94px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; font-size: 1.05rem; font-weight: 900; color: var(--text); letter-spacing: -0.02em; text-decoration: none; }
    .header-logo img { width: 28px; height: 28px; border-radius: 50%; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .day-badge {
      background: var(--orange); color: #fff;
      font-size: 0.7rem; font-weight: 800;
      padding: 4px 10px; border-radius: 100px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    /* ── Cohort summary bar ── */
    .summary-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; gap: 0;
    }
    .stat-item {
      flex: 1; text-align: center;
      padding: 0 8px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-value {
      font-size: 1.4rem; font-weight: 900; color: var(--text);
      letter-spacing: -0.03em; line-height: 1;
      margin-bottom: 3px;
    }
    .stat-value.warn { color: var(--red); }
    .stat-value.good { color: var(--green); }
    .stat-label { font-size: 0.65rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }

    /* ── Content ── */
    .content { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Member card ── */
    .member-card {
      background: var(--card);
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.12s;
    }
    .member-card:active { transform: scale(0.985); }
    .member-card.at-risk  { border-left: 4px solid var(--red);   background: var(--red-lt); }
    .member-card.complete { border-left: 4px solid var(--green); }

    /* Single-row layout */
    .member-top {
      display: flex; align-items: center; gap: 10px;
    }
    .member-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: var(--orange-lt); color: var(--orange);
      font-size: 0.82rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .member-avatar.at-risk { background: var(--red-lt);   color: var(--red); }
    .member-avatar.good    { background: var(--green-lt); color: var(--green); }
    .member-name {
      font-size: 0.86rem; font-weight: 700; color: var(--text);
      letter-spacing: -0.01em; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .member-meta-inline { font-size: 0.72rem; font-weight: 400; color: var(--muted); margin-left: 5px; }
    .member-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .member-strikes { display: flex; gap: 3px; align-items: center; }
    .strike-pip { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .strike-pip.active { background: var(--red); }

    /* Status badge */
    .status-badge {
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 100px;
      font-size: 0.66rem; font-weight: 700; white-space: nowrap;
    }
    .status-badge.on-track { background: var(--green-lt); color: var(--green); }
    .status-badge.at-risk  { background: var(--red-lt);   color: var(--red); }
    /* Chevron */
    .member-chevron {
      font-size: 0.68rem; color: var(--muted);
      transition: transform 0.2s;
    }
    .member-card.open .member-chevron { transform: rotate(180deg); }

    /* ── Expanded member detail ── */
    .member-detail {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .member-detail.open { display: block; }
    .detail-section-title {
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }
    .detail-goal-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border); gap: 8px;
    }
    .detail-goal-row:last-child { border-bottom: none; }
    .detail-goal-name { font-size: 0.84rem; color: var(--text); font-weight: 500; flex: 1; }
    .detail-goal-status { font-size: 0.75rem; font-weight: 700; }
    .detail-goal-status.on  { color: var(--green); }
    .detail-goal-status.off { color: var(--red); }
    .detail-goal-status.na  { color: var(--muted); }
    .redemption-list { margin-top: 10px; }
    .redemption-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .redemption-row:last-child { border-bottom: none; }
    .r-badge {
      flex-shrink: 0;
      padding: 2px 7px; border-radius: 6px;
      font-size: 0.68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .r-badge.pending { background: var(--red-lt);   color: var(--red); }
    .r-badge.done    { background: var(--green-lt); color: var(--green); }
    .r-reason { flex: 1; color: var(--muted); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 0 max(10px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 2px; padding: 10px 0;
      cursor: pointer; text-decoration: none; transition: opacity 0.15s;
    }
    .nav-icon { display: none; }
    .nav-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .nav-item.active .nav-label { color: var(--orange); }

    .empty-state { text-align: center; padding: 48px 20px; font-size: 0.88rem; color: var(--muted); line-height: 1.6; }
    @media (min-width: 768px) {
      html { background: #DDDDE0; }
      body { max-width: 62.5vw; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.12); }
      .bottom-nav { left: 50%; right: auto; transform: translateX(-50%); width: 62.5vw; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo"><img src="brand_assets/logo_eye.png" alt="">21-D Tracker</div>
    <div class="header-right">
      <div class="day-badge" id="dayBadge">—</div>
    </div>
  </div>

  <div class="summary-bar" id="summaryBar">
    <div class="stat-item"><div class="stat-value">—</div><div class="stat-label">Members</div></div>
    <div class="stat-item"><div class="stat-value">—</div><div class="stat-label">On Track</div></div>
    <div class="stat-item"><div class="stat-value">—</div><div class="stat-label">At Risk</div></div>
    <div class="stat-item"><div class="stat-value">—</div><div class="stat-label">Owe Redemp.</div></div>
  </div>
  <div class="content" id="content"></div>

  <nav class="bottom-nav">
    <a class="nav-item" href="app.html">
      <span class="nav-label">Today</span>
    </a>
    <a class="nav-item active" href="cohort.html">
      <span class="nav-label">Cohort</span>
    </a>
    <a class="nav-item" id="adminNav" href="admin.html">
      <span class="nav-label">Admin</span>
    </a>
    <a class="nav-item" href="me.html">
      <span class="nav-label" id="userNavLabel">Me</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://lwlfrmdjgvybocnpchal.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3bGZybWRqZ3Z5Ym9jbnBjaGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NjE4MDYsImV4cCI6MjA4OTQzNzgwNn0.3kG4SxxXHSeu3J6_EmPPsO4Q40Yk0ZRabxlms0zS76U';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } });
    const DUMMY_ADMIN_EMAIL = 'thierry.muller@gmail.com'; // kept for reference only

    // ── Cache ────────────────────────────────────────────────────────────
    const _c = {
      userId: null, profile: null, cohort: null,
      members: [], goals: {}, checkins: {}, redemptions: {},
      checkinsLoaded: new Set()   // track which member IDs have checkins loaded
    };

    const localDateStr   = (d = new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const parseLocalDate = s => { const [y,m,dd] = s.split('-').map(Number); return new Date(y, m-1, dd); };

    // ── Data layer ───────────────────────────────────────────────────────
    const db = {
      // no-op — data comes from Supabase now
      seedIfEmpty() {},

      getCohortDay(startDate, targetDate) {
        const s = parseLocalDate(startDate);
        const t = targetDate ? parseLocalDate(targetDate) : (() => { const n=new Date(); n.setHours(0,0,0,0); return n; })();
        return Math.floor((t-s)/86400000)+1;
      },
      getCohortWeekNum(startDate, date) {
        return Math.min(3, Math.max(1, Math.ceil(this.getCohortDay(startDate,date)/7)));
      },
      getWeekDates(startDate, weekNum) {
        const s = parseLocalDate(startDate);
        return Array.from({length:7},(_,i)=>{ const d=new Date(s); d.setDate(d.getDate()+(weekNum-1)*7+i); return localDateStr(d); });
      },
      getCohortDates(startDate) {
        return Array.from({length:21},(_,i)=>{ const d=parseLocalDate(startDate); d.setDate(d.getDate()+i); return localDateStr(d); });
      },
      // Cache-backed reads
      getGoalsForUser(userId) { return _c.goals[userId] || []; },
      getCheckin(goalId, date) {
        const v = _c.checkins[`${goalId}_${date}`];
        return v !== undefined ? { value: v } : null;
      },
      getWeeklyTotal(goalId, weekDates) {
        return weekDates.reduce((s,d)=>{ const v=_c.checkins[`${goalId}_${d}`]; return s+(v!==undefined?Number(v)||0:0); },0);
      },
      getRedemptionsForUser(userId) { return (_c.redemptions[userId]||[]).slice().sort((a,b)=>a.strikeNumber-b.strikeNumber); },
      getPendingRedemptions(userId) { return this.getRedemptionsForUser(userId).filter(r=>r.status==='pending'); },

      getGoalStatus(goal, cohort) {
        const today = localDateStr();
        const cDay  = this.getCohortDay(cohort.start_date);
        if (goal.type === 'daily_boolean') {
          const c = this.getCheckin(goal.id, today);
          if (!c || !c.value) return { status: cDay > 1 ? 'pending' : 'no-data', label: '—' };
          return { status: 'on-track', label: '✓' };
        }
        if (goal.type === 'weekly_count') {
          const wk = this.getCohortWeekNum(cohort.start_date);
          const wkDates = this.getWeekDates(cohort.start_date, wk);
          const total = this.getWeeklyTotal(goal.id, wkDates);
          const target = (goal.config && goal.config.weeklyTarget) || 1;
          const elapsed = Math.min(7, this.getCohortDay(cohort.start_date, today) - (wk-1)*7);
          if (elapsed >= 7 && total < target) return { status: 'off-track', label: `${total}/${target}` };
          return { status: 'on-track', label: `${total}/${target}` };
        }
        if (goal.type === 'daily_time' || goal.type === 'daily_time_max' || goal.type === 'weekly_time_max') {
          const wk = this.getCohortWeekNum(cohort.start_date);
          const wkDates = this.getWeekDates(cohort.start_date, wk);
          const total = this.getWeeklyTotal(goal.id, wkDates);
          const max = (goal.config && goal.config.weeklyMaxMinutes) || 120;
          return { status: total <= max ? 'on-track' : 'off-track', label: `${Math.round(total/60*10)/10}h` };
        }
        if (goal.type === 'daily_time_min' || goal.type === 'weekly_time_min') {
          const wk = this.getCohortWeekNum(cohort.start_date);
          const wkDates = this.getWeekDates(cohort.start_date, wk);
          const total = this.getWeeklyTotal(goal.id, wkDates);
          const target = (goal.config && goal.config.weeklyTargetMinutes) || 60;
          const elapsed = Math.min(7, this.getCohortDay(cohort.start_date, today) - (wk-1)*7);
          if (elapsed >= 7 && total < target) return { status: 'off-track', label: `${Math.round(total/60*10)/10}h` };
          return { status: 'on-track', label: `${Math.round(total/60*10)/10}h` };
        }
        if (goal.type === 'milestone') {
          const dates = this.getCohortDates(cohort.start_date);
          const done  = dates.some(d => { const c=this.getCheckin(goal.id,d); return c&&c.value; });
          return done ? { status:'on-track', label:'✓' } : { status:'no-data', label:'—' };
        }
        return { status:'no-data', label:'—' };
      },

      getMissedDays(userId, cohort) {
        const today = new Date(); today.setHours(0,0,0,0);
        const dates = this.getCohortDates(cohort.start_date);
        const boolGs = this.getGoalsForUser(userId).filter(g=>g.type==='daily_boolean');
        if (!boolGs.length) return 0;
        let missed = 0;
        for (const d of dates) {
          const dd = new Date(d); dd.setHours(0,0,0,0);
          if (dd >= today) break;
          const allDone = boolGs.every(g => { const c=this.getCheckin(g.id,d); return c&&c.value; });
          if (!allDone) missed++;
        }
        return missed;
      },
    };

    // ── Load data ─────────────────────────────────────────────────────────
    async function loadData() {
      const { data: { session } } = await sb.auth.getSession();
      const authUser = session?.user;
      if (!authUser) { window.location.href = 'index.html'; return false; }
      _c.userId = authUser.id;

      const { data: profile } = await sb.from('profiles').select('*').eq('id', authUser.id).single();
      if (!profile) { window.location.href = 'index.html'; return false; }
      _c.profile = profile;

      // Get cohort for this user
      const { data: memberships } = await sb.from('cohort_members')
        .select('cohort_id, cohorts(*)').eq('user_id', authUser.id);
      if (!memberships?.length) return true;
      const cohorts = memberships.map(m => m.cohorts).filter(Boolean);
      const actives = cohorts.filter(c => { const d = db.getCohortDay(c.start_date); return d >= 1 && d <= 21; });
      const active = actives.sort((a,b) => new Date(b.start_date) - new Date(a.start_date))[0];
      _c.cohort = active || cohorts.sort((a,b) => new Date(b.start_date) - new Date(a.start_date))[0];
      if (!_c.cohort) return true;

      // Get all members of cohort
      const { data: memberRows } = await sb.from('cohort_members')
        .select('user_id, profiles(*)').eq('cohort_id', _c.cohort.id);
      _c.members = (memberRows || []).map(r => r.profiles).filter(Boolean);

      // Goals for all members
      const memberIds = _c.members.map(m => m.id);
      const { data: goalsRaw } = await sb.from('goals')
        .select('*').eq('cohort_id', _c.cohort.id).in('user_id', memberIds).order('sort_order');
      _c.goals = {};
      for (const g of (goalsRaw || [])) {
        if (!_c.goals[g.user_id]) _c.goals[g.user_id] = [];
        _c.goals[g.user_id].push({ id: g.id, userId: g.user_id, cohortId: g.cohort_id, type: g.type, title: g.title, config: g.config || {}, locked: g.locked, order: g.sort_order });
      }

      // Redemptions for all members
      const { data: redemptionsRaw } = await sb.from('redemptions')
        .select('*').eq('cohort_id', _c.cohort.id).in('user_id', memberIds).order('strike_number');
      _c.redemptions = {};
      for (const r of (redemptionsRaw || [])) {
        if (!_c.redemptions[r.user_id]) _c.redemptions[r.user_id] = [];
        _c.redemptions[r.user_id].push({ id: r.id, userId: r.user_id, cohortId: r.cohort_id, weekNumber: r.week_number, strikeNumber: r.strike_number, status: r.status, reason: r.reason });
      }
      return true;
    }

    // ── Render ───────────────────────────────────────────────────────────
    let expanded = null;

    // ── Init ─────────────────────────────────────────────────────────────
    (async () => {
      const ok = await loadData();
      if (!ok) return;

      const cohort = _c.cohort;
      const session = { userId: _c.userId, role: _c.profile?.role };




      if (!cohort) {
        document.getElementById('content').innerHTML = '<div class="empty-state">No active cohort found.</div>';
        return;
      }

      const day = db.getCohortDay(cohort.start_date);
      document.getElementById('dayBadge').textContent = day>=1&&day<=21 ? `Day ${day}` : day<1 ? 'Upcoming' : 'Complete';
      render();
    })();

    function render() {
      renderSummary();
      renderMembers();
    }

    function renderSummary() {
      const members = _c.members;
      const atRisk  = members.filter(m => isAtRisk(m.id));
      const onTrack = members.filter(m => !isAtRisk(m.id));
      const pending = members.filter(m => db.getPendingRedemptions(m.id).length > 0);

      document.getElementById('summaryBar').innerHTML = `
        <div class="stat-item">
          <div class="stat-value">${members.length}</div>
          <div class="stat-label">Members</div>
        </div>
        <div class="stat-item">
          <div class="stat-value good">${onTrack.length}</div>
          <div class="stat-label">On Track</div>
        </div>
        <div class="stat-item">
          <div class="stat-value${atRisk.length>0?' warn':''}">${atRisk.length}</div>
          <div class="stat-label">At Risk</div>
        </div>
        <div class="stat-item">
          <div class="stat-value${pending.length>0?' warn':''}">${pending.length}</div>
          <div class="stat-label">Owe Redemp.</div>
        </div>`;
    }

    function isAtRisk(userId) {
      const pending = db.getPendingRedemptions(userId).length;
      const strikes = db.getRedemptionsForUser(userId).length;
      return pending > 0 || strikes >= 2;
    }

    function renderMembers() {
      const members = _c.members.slice();
      if (!members.length) {
        document.getElementById('content').innerHTML = '<div class="empty-state">No members yet.</div>';
        return;
      }

      // Sort: at-risk first, then alphabetical
      members.sort((a,b) => {
        const ar = isAtRisk(a.id) ? 0 : 1;
        const br = isAtRisk(b.id) ? 0 : 1;
        return ar - br || a.name.localeCompare(b.name);
      });

      document.getElementById('content').innerHTML = members.map(m => {
        try { return renderMemberCard(m); }
        catch(e) { return `<div style="padding:10px 14px;background:#FF3B30;color:#fff;border-radius:10px;font-size:0.8rem;font-weight:600;">${m.name}: ${e.message}</div>`; }
      }).join('');
    }

    function renderMemberCard(member) {
      const goals       = db.getGoalsForUser(member.id);
      const strikes     = db.getRedemptionsForUser(member.id);
      const atRisk      = isAtRisk(member.id);
      const isSelf      = member.id === _c.userId;
      const strikeCount = strikes.length;
      const isOpen      = expanded === member.id;
      const hasCheckins = _c.checkinsLoaded.has(member.id);

      const pips = [1,2,3].map(n=>`<div class="strike-pip${n<=strikeCount?' active':''}"></div>`).join('');

      const avatarClass = atRisk ? 'at-risk' : strikeCount===0 ? 'good' : '';
      const cardClass   = (atRisk ? 'at-risk' : strikeCount===0 ? 'complete' : '') + (isOpen ? ' open' : '');

      const badge = atRisk
        ? `<span class="status-badge at-risk">⚠ At Risk</span>`
        : `<span class="status-badge on-track">✓ On Track</span>`;

      // Detail section — only built when checkins are loaded
      let detailHTML = '';
      if (isOpen) {
        if (!hasCheckins) {
          detailHTML = '<div style="font-size:0.8rem;color:var(--muted);padding:8px 0;">Loading…</div>';
        } else {
          const detailGoals = goals.map(g => {
            const s = db.getGoalStatus(g, _c.cohort);
            const statusClass = s.status==='on-track' ? 'on' : s.status==='off-track' ? 'off' : 'na';
            const statusText  = s.status==='on-track' ? '✓ On track' : s.status==='off-track' ? '✗ Off track' : s.status==='pending' ? '· Not yet' : '—';
            return `<div class="detail-goal-row">
              <div class="detail-goal-name">${g.title}</div>
              <div class="detail-goal-status ${statusClass}">${statusText}</div>
            </div>`;
          }).join('');

          const detailRedemptions = strikes.length ? strikes.map(r => `
            <div class="redemption-row">
              <span class="r-badge ${r.status}">${r.status==='pending'?'Pending':'Done'}</span>
              <span class="r-reason">${r.reason}</span>
            </div>`).join('') : '<div style="font-size:0.8rem;color:var(--muted);padding:4px 0;">No strikes yet.</div>';

          detailHTML = `
            <div style="margin-bottom:14px;">
              <div class="detail-section-title">Goals</div>
              ${detailGoals || '<div style="font-size:0.8rem;color:var(--muted);">No goals yet.</div>'}
            </div>
            <div>
              <div class="detail-section-title">Redemptions</div>
              <div class="redemption-list">${detailRedemptions}</div>
            </div>`;
        }
      }

      return `
        <div class="member-card ${cardClass}" onclick="toggleExpand('${member.id}')">
          <div class="member-top">
            <div class="member-avatar ${avatarClass}">${member.name[0].toUpperCase()}</div>
            <div class="member-name">${member.name}${isSelf?' <span class="member-meta-inline">(you)</span>':''}<span class="member-meta-inline">· ${strikeCount} strike${strikeCount!==1?'s':''}</span></div>
            <div class="member-right">
              ${badge}
              <div class="member-strikes">${pips}</div>
              <span class="member-chevron">▼</span>
            </div>
          </div>
          <div class="member-detail${isOpen?' open':''}">
            ${detailHTML}
          </div>
        </div>`;
    }

    async function toggleExpand(memberId) {
      if (expanded === memberId) {
        expanded = null;
        renderMembers();
        return;
      }
      expanded = memberId;
      renderMembers(); // show card open with "Loading…" immediately

      if (!_c.checkinsLoaded.has(memberId)) {
        const goalIds = db.getGoalsForUser(memberId).map(g => g.id);
        if (goalIds.length) {
          const { data: rows } = await sb.from('checkins').select('goal_id,date,value').in('goal_id', goalIds);
          for (const r of (rows || [])) _c.checkins[`${r.goal_id}_${r.date}`] = r.value;
        }
        _c.checkinsLoaded.add(memberId);
      }
      renderMembers(); // re-render with real data
    }

    async function logout() { await sb.auth.signOut(); window.location.href='index.html'; }
  </script>
</body>
</html>
